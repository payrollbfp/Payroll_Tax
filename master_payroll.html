<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Payroll Karyawan</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"California FB", serif;
}
body{
    min-height:100vh;
    background:linear-gradient(135deg,#d9918f,#6a85c9);
    padding:30px;
    color:white;
}
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    padding:20px 30px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
}
.back-btn{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:white;
    color:#123;
    cursor:pointer;
    font-weight:bold;
}
.container{
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:25px;
}
.search-box{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}
.search-box input{
    padding:10px;
    border:none;
    border-radius:8px;
    width:250px;
}
.search-box button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:white;
    color:#123;
    cursor:pointer;
    font-weight:bold;
}
table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,0.12);
}
th,td{
    padding:10px;
    text-align:left;
}
th{
    background:rgba(255,255,255,0.2);
}
.pagination{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
}
.pagination button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}
.active-page{
    background:#123;
    color:white;
}
</style>
</head>

<body>

<div class="header">
    <h1>Master Payroll Karyawan</h1>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">Back</button>
</div>

<div class="container">

    <!-- SEARCH -->
    <div class="search-box">
        <input type="text" id="searchNama" placeholder="Search by Nama">
        <button onclick="searchPayroll()">Search</button>
    </div>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>Nopeg</th>
                <th>NIK</th>
                <th>NPWP</th>
                <th>Nama</th>
                <th>Jenis Kelamin</th>
                <th>Alamat</th>
                <th>Status Pajak</th>
                <th>TMT</th>
                <th>Project</th>
            </tr>
        </thead>
        <tbody id="payrollTable"></tbody>
    </table>

    <!-- PAGINATION -->
    <div class="pagination" id="pagination"></div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxrtvj3yyggGvCUkIuxlhWpFXyFHo52ioxckYumyOcF3LY6nM1pe_hYbiE-brPHTy44uw/exec";

let payrollData = [];
let filteredData = [];
let currentPage = 1;
const rowsPerPage = 20;

// LOAD DATA
async function loadPayroll(){
    try{
        const res = await fetch(API_URL + "?action=getPayroll");
        const result = await res.json();

        if(!result.success){
            alert(result.message || "Gagal ambil data");
            return;
        }

        payrollData = result.data;
        filteredData = payrollData;
        currentPage = 1;
        renderTable();
        renderPagination();

    }catch(err){
        console.error(err);
        alert("Gagal load data (cek API)");
    }
}

// RENDER TABLE
function renderTable(){
    const start = (currentPage - 1) * rowsPerPage;
    const end = start + rowsPerPage;
    const pageData = filteredData.slice(start, end);

    let rows = "";

    pageData.forEach(item=>{
        rows += `
        <tr>
            <td>${item[0] || ""}</td>
            <td>${item[1] || ""}</td>
            <td>${item[2] || ""}</td>
            <td>${item[3] || ""}</td>
            <td>${item[4] || ""}</td>
            <td>${item[5] || ""}</td>
            <td>${item[6] || ""}</td>
            <td>${item[7] || ""}</td>
            <td>${item[8] || ""}</td>
        </tr>`;
    });

    document.getElementById("payrollTable").innerHTML = rows;
}

// SEARCH NAMA
function searchPayroll(){
    const keyword = document.getElementById("searchNama").value.toLowerCase();

    filteredData = payrollData.filter(item =>
        (item[3] || "").toLowerCase().includes(keyword)
    );

    currentPage = 1;
    renderTable();
    renderPagination();
}

// PAGINATION
function renderPagination(){
    const totalPages = Math.ceil(filteredData.length / rowsPerPage);
    let html = "";

    html += `<button onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}>Previous</button>`;

    let startPage = Math.max(1, currentPage - 2);
    let endPage = Math.min(totalPages, startPage + 4);

    if(endPage - startPage < 4){
        startPage = Math.max(1, endPage - 4);
    }

    for(let i=startPage; i<=endPage; i++){
        html += `<button class="${i===currentPage?'active-page':''}" onclick="changePage(${i})">${i}</button>`;
    }

    html += `<button onclick="changePage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Next</button>`;

    document.getElementById("pagination").innerHTML = html;
}

// CHANGE PAGE
function changePage(page){
    const totalPages = Math.ceil(filteredData.length / rowsPerPage);
    if(page < 1 || page > totalPages) return;

    currentPage = page;
    renderTable();
    renderPagination();
}

// INIT
window.onload = loadPayroll;
</script>

</body>
</html>
