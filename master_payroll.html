<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxrtvj3yyggGvCUkIuxlhWpFXyFHo52ioxckYumyOcF3LY6nM1pe_hYbiE-brPHTy44uw/exec";

let allData = [];
let currentPage = 1;
const limit = 20;

const tableBody = document.getElementById("payrollTable");

// ================= LOAD DATA SEKALI =================
async function loadData(){
  try{
    const res = await fetch(`${API_URL}?action=getPayroll`);
    const data = await res.json();

    // kalau masih format array langsung
    allData = Array.isArray(data) ? data : data.data;

    renderTable();
    renderPagination();

  }catch(err){
    console.error(err);
    alert("Gagal load data");
  }
}

// ================= RENDER TABLE =================
function renderTable(){
  const start = (currentPage - 1) * limit;
  const end = start + limit;

  const pageData = allData.slice(start, end);

  let rows = "";

  pageData.forEach(item=>{
    rows += `<tr>
      <td>${item[0]||""}</td>
      <td>${item[1]||""}</td>
      <td>${item[2]||""}</td>
      <td>${item[3]||""}</td>
      <td>${item[4]||""}</td>
      <td>${item[5]||""}</td>
      <td>${item[6]||""}</td>
      <td>${item[7]||""}</td>
      <td>${item[8]||""}</td>
    </tr>`;
  });

  tableBody.innerHTML = rows;
}

// ================= PAGINATION =================
function renderPagination(){
  const totalPages = Math.ceil(allData.length / limit);
  let html = "";

  // PREV
  html += `<button onclick="prevPage()" ${currentPage===1?"disabled":""}>Prev</button>`;

  // RANGE 5 HALAMAN
  let startPage = Math.max(1, currentPage - 2);
  let endPage = Math.min(totalPages, startPage + 4);

  if(endPage - startPage < 4){
    startPage = Math.max(1, endPage - 4);
  }

  for(let i = startPage; i <= endPage; i++){
    html += `<button onclick="goToPage(${i})" ${i===currentPage?'style="background:white;color:black;font-weight:bold"':''}>${i}</button>`;
  }

  // NEXT
  html += `<button onclick="nextPage()" ${currentPage===totalPages?"disabled":""}>Next</button>`;

  document.getElementById("pagination").innerHTML = html;
}

// ================= NAVIGATION =================
function goToPage(page){
  currentPage = page;
  renderTable();
  renderPagination();
}

function prevPage(){
  if(currentPage > 1){
    currentPage--;
    renderTable();
    renderPagination();
  }
}

function nextPage(){
  const totalPages = Math.ceil(allData.length / limit);
  if(currentPage < totalPages){
    currentPage++;
    renderTable();
    renderPagination();
  }
}

// INIT
window.onload = loadData;
</script>
