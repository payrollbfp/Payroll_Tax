<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Payroll</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    min-height:100vh;
}

/* HEADER */
.header{
    background:#1f2d3d;
    color:white;
    padding:20px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h1{
    font-size:28px;
}

.header-buttons{
    display:flex;
    gap:10px;
}

.back-btn, .logout-btn{
    padding:10px 16px;
    border:none;
    border-radius:5px;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.back-btn{
    background:#3498db;
}

.back-btn:hover{
    background:#2980b9;
}

.logout-btn{
    background:#e74c3c;
}

.logout-btn:hover{
    background:#c0392b;
}

/* CONTENT */
.container{
    padding:30px;
}

.card{
    background:white;
    border-radius:8px;
    padding:25px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

/* FORM */
.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    margin-bottom:6px;
    font-weight:bold;
    color:#2c3e50;
}

.form-group input,
.form-group select{
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

.action-buttons{
    margin-top:25px;
    display:flex;
    gap:10px;
}

.save-btn{
    background:#27ae60;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.save-btn:hover{
    background:#219150;
}

.reset-btn{
    background:#95a5a6;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.reset-btn:hover{
    background:#7f8c8d;
}
</style>
</head>
<body>

<div class="header">
    <h1>Master Payroll</h1>
    <div class="header-buttons">
        <button class="back-btn" onclick="goBack()">Back</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2>Input Data Karyawan</h2>

        <div class="form-grid">
            <div class="form-group">
                <label>NIK</label>
                <input type="text" placeholder="Masukkan NIK">
            </div>

            <div class="form-group">
                <label>Nama Karyawan</label>
                <input type="text" placeholder="Masukkan Nama">
            </div>

            <div class="form-group">
                <label>Jabatan</label>
                <input type="text" placeholder="Masukkan Jabatan">
            </div>

            <div class="form-group">
                <label>Department</label>
                <input type="text" placeholder="Masukkan Department">
            </div>

            <div class="form-group">
                <label>Gaji Pokok</label>
                <input type="number" placeholder="Masukkan Gaji Pokok">
            </div>

            <div class="form-group">
                <label>Status PTKP</label>
                <select>
                    <option>TK/0</option>
                    <option>K/0</option>
                    <option>K/1</option>
                    <option>K/2</option>
                    <option>K/3</option>
                </select>
            </div>
        </div>

        <div class="action-buttons">
            <button class="save-btn">Save</button>
            <button class="reset-btn">Reset</button>
        </div>
    </div>
</div>

<script>
function goBack(){
    window.location.href = "dashboard.html";
}

function logout(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
