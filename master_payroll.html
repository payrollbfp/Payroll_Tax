<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Payroll Karyawan</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    min-height:100vh;
    background:linear-gradient(135deg,#d9918f,#6a85c9);
    padding:30px;
    color:white;
}
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    padding:20px 30px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
}
.back-btn{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:white;
    color:#123;
    cursor:pointer;
    font-weight:bold;
}
.container{
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:25px;
}
input{
    padding:10px;
    border-radius:8px;
    border:none;
    flex:1;
}
.search-bar{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}
.search-btn{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:white;
    color:#123;
    cursor:pointer;
    font-weight:bold;
    white-space:nowrap;
}
table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,0.12);
}
th,td{
    padding:10px;
    text-align:left;
}
th{
    background:rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="header">
    <h1>Master Payroll Karyawan</h1>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">Back</button>
</div>

<div class="container">

<div class="search-bar">
    <input type="text" id="searchInput" placeholder="Cari Nama Karyawan...">
    <button class="search-btn" onclick="filterByNama()">Search</button>
</div>

<table>
    <thead>
        <tr>
            <th>Nopeg</th>
            <th>NIK</th>
            <th>NPWP</th>
            <th>Nama</th>
            <th>Jenis Kelamin</th>
            <th>Alamat</th>
            <th>PTKP</th>
            <th>TMT</th>
            <th>Project</th>
        </tr>
    </thead>
    <tbody id="payrollTable"></tbody>
</table>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxrtvj3yyggGvCUkIuxlhWpFXyFHo52ioxckYumyOcF3LY6nM1pe_hYbiE-brPHTy44uw/exec";

// LOAD DATA
async function loadPayroll(){
    try{
        const res = await fetch(API_URL + "?action=getPayroll");
        const result = await res.json();

        if(!result.success){
            alert(result.message || "Gagal ambil data");
            return;
        }

        let rows = "";

        result.data.forEach(item=>{
            rows += `
            <tr>
                <td>${item[0] || ""}</td>
                <td>${item[1] || ""}</td>
                <td>${item[2] || ""}</td>
                <td class="nama">${item[3] || ""}</td>
                <td>${item[4] || ""}</td>
                <td>${item[5] || ""}</td>
                <td>${item[6] || ""}</td>
                <td>${item[7] || ""}</td>
                <td>${item[8] || ""}</td>
            </tr>`;
        });

        document.getElementById("payrollTable").innerHTML = rows;

    }catch(err){
        console.error(err);
        alert("Gagal load data (cek API)");
    }
}

// CACHE DATA (BIAR CEPAT)
let cachedRows = [];

// LOAD DATA
async function loadPayroll(){
    try{
        const res = await fetch(API_URL + "?action=getPayroll");
        const result = await res.json();

        if(!result.success){
            alert(result.message || "Gagal ambil data");
            return;
        }

        let rowsHTML = "";
        cachedRows = [];

        result.data.forEach(item=>{
            const nama = (item[3] || "").toString();

            rowsHTML += `
            <tr>
                <td>${item[0] || ""}</td>
                <td>${item[1] || ""}</td>
                <td>${item[2] || ""}</td>
                <td class="nama">${nama}</td>
                <td>${item[4] || ""}</td>
                <td>${item[5] || ""}</td>
                <td>${item[6] || ""}</td>
                <td>${item[7] || ""}</td>
                <td>${item[8] || ""}</td>
            </tr>`;
        });

        const tbody = document.getElementById("payrollTable");
        tbody.innerHTML = rowsHTML;

        // CACHE ROW + NAMA (LOWERCASE)
        const rows = tbody.querySelectorAll("tr");
        rows.forEach(row => {
            const namaCell = row.querySelector(".nama");
            cachedRows.push({
                el: row,
                nama: namaCell ? namaCell.textContent.toLowerCase() : ""
            });
        });

    }catch(err){
        console.error(err);
        alert("Gagal load data (cek API)");
    }
}

// SEARCH SUPER CEPAT (PAKAI CACHE)
function filterByNama(){
    const keyword = document.getElementById("searchInput").value.toLowerCase().trim();

    // LOOP CACHE (LEBIH CEPAT DARI QUERY DOM BERULANG)
    for(let i=0;i<cachedRows.length;i++){
        const item = cachedRows[i];

        if(item.nama.includes(keyword)){
            item.el.style.display = "";
        }else{
            item.el.style.display = "none";
        }
    }
}

// EVENT (INPUT + ENTER + BUTTON)
let debounceTimer;
const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("input", function(){
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(filterByNama, 150);
});

searchInput.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        filterByNama();
    }
});

// INIT
window.onload = loadPayroll;

</script>

</body>
</html>
