<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Payroll Karyawan</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    min-height:100vh;
    background:linear-gradient(135deg,#d9918f,#6a85c9);
    padding:30px;
    color:white;
}
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    padding:20px 30px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
}
.back-btn{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:white;
    color:#123;
    cursor:pointer;
    font-weight:bold;
}
.container{
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:25px;
}
.search-bar{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}
input{
    flex:1;
    padding:10px;
    border-radius:8px;
    border:none;
}
.search-btn{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:white;
    color:#123;
    cursor:pointer;
    font-weight:bold;
}
table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,0.12);
}
th,td{
    padding:10px;
    text-align:left;
}
th{
    background:rgba(255,255,255,0.2);
}
.pagination{
    margin-top:15px;
    display:flex;
    flex-wrap:wrap;
    gap:5px;
}
.pagination button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.active-page{
    background:#fff;
    color:#123;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
    <h1>Master Payroll Karyawan</h1>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">Back</button>
</div>

<div class="container">

<div class="search-bar">
    <input type="text" id="searchInput" placeholder="Cari Nama Karyawan...">
    <button class="search-btn" onclick="searchData()">Search</button>
</div>

<table>
    <thead>
        <tr>
            <th>Nopeg</th>
            <th>NIK</th>
            <th>NPWP</th>
            <th>Nama</th>
            <th>Jenis Kelamin</th>
            <th>Alamat</th>
            <th>PTKP</th>
            <th>TMT</th>
            <th>Project</th>
        </tr>
    </thead>
    <tbody id="payrollTable"></tbody>
</table>

<div id="pagination" class="pagination"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxrtvj3yyggGvCUkIuxlhWpFXyFHo52ioxckYumyOcF3LY6nM1pe_hYbiE-brPHTy44uw/exec";

let currentPage = 1;
const limit = 10;

async function loadPayroll(){
    const keyword = document.getElementById("searchInput").value;

    try{
        const res = await fetch(`${API_URL}?action=getPayroll&search=${keyword}&page=${currentPage}&limit=${limit}`);
        const result = await res.json();

        if(!result.success){
            alert(result.message || "Gagal ambil data");
            return;
        }

        let rows = "";

        result.data.forEach(item=>{
            rows += `
            <tr>
                <td>${item[0] || ""}</td>
                <td>${item[1] || ""}</td>
                <td>${item[2] || ""}</td>
                <td>${item[3] || ""}</td>
                <td>${item[4] || ""}</td>
                <td>${item[5] || ""}</td>
                <td>${item[6] || ""}</td>
                <td>${item[7] || ""}</td>
                <td>${item[8] || ""}</td>
            </tr>`;
        });

        document.getElementById("payrollTable").innerHTML = rows;

        renderPagination(result.total);

    }catch(err){
        console.error(err);
        alert("Gagal koneksi ke server");
    }
}

function renderPagination(total){
    const totalPages = Math.ceil(total / limit);
    let buttons = "";

    for(let i=1; i<=totalPages; i++){
        buttons += `
        <button onclick="goToPage(${i})" class="${i === currentPage ? 'active-page' : ''}">
        ${i}
        </button>`;
    }

    document.getElementById("pagination").innerHTML = buttons;
}

function goToPage(page){
    currentPage = page;
    loadPayroll();
}

function searchData(){
    currentPage = 1;
    loadPayroll();
}

// ENTER KEY SUPPORT
const searchInput = document.getElementById("searchInput");
searchInput.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        searchData();
    }
});

// INIT
window.onload = loadPayroll;

</script>

</body>
</html>
