<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxrtvj3yyggGvCUkIuxlhWpFXyFHo52ioxckYumyOcF3LY6nM1pe_hYbiE-brPHTy44uw/exec";

let currentPage = 1;
let limit = 10;
let totalPages = 1;
let isLoading = false;
let cache = {};

const searchInput = document.getElementById("searchInput");
const limitSelect = document.getElementById("limitSelect");
const loadingEl = document.getElementById("loading");

async function loadPayroll(){
  if(isLoading) return;
  isLoading = true;

  const keyword = searchInput.value;
  const cacheKey = `${keyword}_${currentPage}_${limit}`;

  loadingEl.style.display = "block";

  try{
    if(cache[cacheKey]){
      renderTable(cache[cacheKey]);
      isLoading = false;
      loadingEl.style.display = "none";
      return;
    }

    const res = await fetch(`${API_URL}?action=getPayroll&search=${keyword}&page=${currentPage}&limit=${limit}`);
    const result = await res.json();

    cache[cacheKey] = result;
    renderTable(result);

  }catch(err){
    console.error(err);
    alert("Error server");
  }

  isLoading = false;
  loadingEl.style.display = "none";
}

function renderTable(result){
  let rows = "";
  result.data.forEach(item=>{
    rows += `<tr>
      <td>${item[0]||""}</td>
      <td>${item[1]||""}</td>
      <td>${item[2]||""}</td>
      <td>${item[3]||""}</td>
      <td>${item[4]||""}</td>
      <td>${item[5]||""}</td>
      <td>${item[6]||""}</td>
      <td>${item[7]||""}</td>
      <td>${item[8]||""}</td>
    </tr>`;
  });

  document.getElementById("payrollTable").innerHTML = rows;

  totalPages = Math.ceil(result.total / limit);
  renderPagination();
}

function renderPagination(){
  let html = "";

  html += `<button onclick="prevPage()" ${currentPage===1?'disabled':''}>Prev</button>`;
  html += `<span> Page ${currentPage} / ${totalPages} </span>`;
  html += `<button onclick="nextPage()" ${currentPage===totalPages?'disabled':''}>Next</button>`;

  document.getElementById("pagination").innerHTML = html;
}

function prevPage(){ if(currentPage>1){ currentPage--; loadPayroll(); }}
function nextPage(){ if(currentPage<totalPages){ currentPage++; loadPayroll(); }}

function searchData(){
  cache = {};
  currentPage = 1;
  loadPayroll();
}

searchInput.addEventListener("keypress", function(e){
  if(e.key === "Enter") searchData();
});

limitSelect.addEventListener("change", function(){
  limit = parseInt(this.value);
  cache = {};
  currentPage = 1;
  loadPayroll();
});

window.onload = loadPayroll;
</script>
