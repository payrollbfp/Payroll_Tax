<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Payroll Karyawan</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"California FB", serif;
}
body{
    min-height:100vh;
    background:linear-gradient(135deg,#d9918f,#6a85c9);
    padding:30px;
    color:white;
}
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    padding:20px 30px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
}
.back-btn{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:white;
    color:#123;
    cursor:pointer;
    font-weight:bold;
}
.container{
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:25px;
}
.search-box{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}
.search-box input{
    padding:10px;
    border:none;
    border-radius:8px;
    width:250px;
}
.search-box button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:white;
    color:#123;
    cursor:pointer;
    font-weight:bold;
}
table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,0.12);
}
th,td{
    padding:10px;
    text-align:left;
}
th{
    background:rgba(255,255,255,0.2);
}
.pagination{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
}
.pagination button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}
.active-page{
    background:#123;
    color:white;
}
</style>
</head>

<body>

<div class="header">
    <h1>Master Payroll Karyawan</h1>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">Back</button>
</div>

<div class="container">

    <div class="search-box">
        <input type="text" id="searchNama" placeholder="Search by Nama">
        <button onclick="searchPayroll()">Search</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nopeg</th>
                <th>NIK</th>
                <th>NPWP</th>
                <th>Nama</th>
                <th>Jenis Kelamin</th>
                <th>Alamat</th>
                <th>Status Pajak</th>
                <th>TMT</th>
                <th>Project</th>
            </tr>
        </thead>
        <tbody id="payrollTable"></tbody>
    </table>

    <div class="pagination" id="pagination"></div>

</div>

<script>
const SUPABASE_URL = "https://nwrbjbwjmkahjuuyizfq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53cmJqYndqbWthaGp1dXlpemZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjM4OTIsImV4cCI6MjA5MjQ5OTg5Mn0.n67pONlkoMqZguyoTwQQFJ0VBRfPaIVuVlPGxsajaGA";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let payrollData = [];
let filteredData = [];
let currentPage = 1;
const rowsPerPage = 20;

/* LOAD DATA */
async function loadPayroll(){
    const { data, error } = await supabaseClient
        .from("master_payroll")
        .select("*")
        .order("nama", { ascending: true });

    if(error){
        console.error(error);
        alert("Gagal load data master payroll");
        return;
    }

    payrollData = data;
    filteredData = data;
    currentPage = 1;

    renderTable();
    renderPagination();
}

/* RENDER TABLE */
function renderTable(){
    const start = (currentPage - 1) * rowsPerPage;
    const end = start + rowsPerPage;
    const pageData = filteredData.slice(start, end);

    let rows = "";

    pageData.forEach(item=>{
        rows += `
        <tr>
            <td>${item.nopeg || ""}</td>
            <td>${item.nik || ""}</td>
            <td>${item.npwp || ""}</td>
            <td>${item.nama || ""}</td>
            <td>${item.jenis_kelamin || ""}</td>
            <td>${item.alamat || ""}</td>
            <td>${item.status_pajak || ""}</td>
            <td>${item.tmt || ""}</td>
            <td>${item.project || ""}</td>
        </tr>`;
    });

    document.getElementById("payrollTable").innerHTML = rows;
}

/* SEARCH */
function searchPayroll(){
    const keyword = document.getElementById("searchNama").value.toLowerCase();

    filteredData = payrollData.filter(item =>
        (item.nama || "").toLowerCase().includes(keyword)
    );

    currentPage = 1;
    renderTable();
    renderPagination();
}

/* PAGINATION */
function renderPagination(){
    const totalPages = Math.ceil(filteredData.length / rowsPerPage);
    let html = "";

    html += `<button onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}>Previous</button>`;

    for(let i=1; i<=totalPages; i++){
        html += `<button class="${i===currentPage?'active-page':''}" onclick="changePage(${i})">${i}</button>`;
    }

    html += `<button onclick="changePage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Next</button>`;

    document.getElementById("pagination").innerHTML = html;
}

/* CHANGE PAGE */
function changePage(page){
    const totalPages = Math.ceil(filteredData.length / rowsPerPage);
    if(page < 1 || page > totalPages) return;

    currentPage = page;
    renderTable();
    renderPagination();
}

window.onload = loadPayroll;
</script>

</body>
</html>
