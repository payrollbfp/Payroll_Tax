<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Master Payroll</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family:Segoe UI,sans-serif;
    background:#eef2f7;
    margin:0;
}
.header{
    background:#1e293b;
    color:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.container{
    padding:20px;
}
.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,0,0,0.1);
}
button{
    border:none;
    padding:8px 12px;
    margin:4px;
    border-radius:6px;
    cursor:pointer;
}
.btn1{background:#3b82f6;color:white;}
.btn2{background:#10b981;color:white;}
.btn3{background:#f59e0b;color:white;}
.btnBack{background:#64748b;color:white;}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
th,td{
    padding:8px;
    border:1px solid #ddd;
    font-size:12px;
}
th{
    background:#334155;
    color:white;
}
.loading{
    display:none;
    color:#3b82f6;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="header">
    <h2>Upload Master Payroll</h2>
    <button class="btnBack" onclick="window.location.href='dashboard.html'">Back</button>
</div>

<div class="container">
<div class="card">

<input type="file" id="fileInput">
<button class="btn1" onclick="previewFile()">Preview</button>
<button class="btn2" onclick="saveData()">Save</button>
<button class="btn3" onclick="replaceData()">Replace All</button>

<p id="loading" class="loading">⏳ Processing...</p>

<table>
<thead>
<tr>
    <th>Nopeg</th>
    <th>NIK</th>
    <th>NPWP</th>
    <th>Nama</th>
    <th>Jenis Kelamin</th>
    <th>Alamat</th>
    <th>Status Pajak</th>
    <th>TMT</th>
    <th>Project</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>
</div>

<script>
const SUPABASE_URL = "https://nwrbjbwjmkahjuuyizfq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53cmJqYndqbWthaGp1dXlpemZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjM4OTIsImV4cCI6MjA5MjQ5OTg5Mn0.n67pONlkoMqZguyoTwQQFJ0VBRfPaIVuVlPGxsajaGA";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let masterData = [];

/* PREVIEW FILE */
function previewFile(){
    const file = document.getElementById("fileInput").files[0];
    if(!file) return alert("Pilih file Excel");

    loading(true);

    const reader = new FileReader();
    reader.onload = function(e){
        const workbook = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        masterData = XLSX.utils.sheet_to_json(sheet);

        renderTable();
        loading(false);
    };
    reader.readAsArrayBuffer(file);
}

/* RENDER TABLE */
function renderTable(){
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    masterData.forEach(row=>{
        tbody.innerHTML += `
        <tr>
            <td>${row.nopeg || ''}</td>
            <td>${row.nik || ''}</td>
            <td>${row.npwp || ''}</td>
            <td>${row.nama || ''}</td>
            <td>${row.jenis_kelamin || ''}</td>
            <td>${row.alamat || ''}</td>
            <td>${row.status_pajak || ''}</td>
            <td>${row.tmt || ''}</td>
            <td>${row.project || ''}</td>
        </tr>`;
    });
}

/* FORMAT DATA */
function formatData(){
    return masterData.map(r => ({
        nopeg: r.nopeg || '',
        nik: r.nik || '',
        npwp: r.npwp || '',
        nama: r.nama || '',
        jenis_kelamin: r.jenis_kelamin || '',
        alamat: r.alamat || '',
        status_pajak: r.status_pajak || '',
        tmt: r.tmt || '',
        project: r.project || ''
    }));
}

/* SAVE */
async function saveData(){
    if(masterData.length===0) return alert("Tidak ada data");

    loading(true);

    const { error } = await supabaseClient
        .from("master_payroll")
        .insert(formatData());

    loading(false);

    if(error){
        console.error(error);
        alert("❌ Gagal simpan data");
    }else{
        alert("✅ Data berhasil disimpan");
    }
}

/* REPLACE */
async function replaceData(){
    if(masterData.length===0) return alert("Tidak ada data");
    if(!confirm("Hapus semua data lama dan replace?")) return;

    loading(true);

    const { error: deleteError } = await supabaseClient
        .from("master_payroll")
        .delete()
        .neq("id",0);

    if(deleteError){
        loading(false);
        console.error(deleteError);
        return alert("❌ Gagal hapus data lama");
    }

    const { error: insertError } = await supabaseClient
        .from("master_payroll")
        .insert(formatData());

    loading(false);

    if(insertError){
        console.error(insertError);
        alert("❌ Gagal replace data");
    }else{
        alert("✅ Replace berhasil");
    }
}

/* LOADING */
function loading(show){
    document.getElementById("loading").style.display = show ? "block" : "none";
}
</script>

</body>
</html>
