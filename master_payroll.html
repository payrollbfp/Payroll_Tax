<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Payroll Karyawan</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    min-height:100vh;
    background:linear-gradient(135deg,#d9918f,#6a85c9);
    padding:30px;
    color:white;
}
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    padding:20px 30px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
}
.back-btn{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:white;
    color:#123;
    cursor:pointer;
    font-weight:bold;
}
.container{
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:25px;
}
.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:20px;
}
.input-group{
    display:flex;
    flex-direction:column;
}
.input-group label{
    margin-bottom:5px;
}
.input-group input,
.input-group select{
    padding:10px;
    border:none;
    border-radius:8px;
}
.save-btn{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:white;
    color:#123;
    cursor:pointer;
    font-weight:bold;
    margin-bottom:20px;
}
table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,0.12);
}
th,td{
    padding:10px;
    text-align:center;
}
th{
    background:rgba(255,255,255,0.2);
}
</style>

</head>

<body>

<div class="header">
    <h1>Master Payroll Karyawan</h1>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">Back</button>
</div>

<div class="container">

<!-- FORM -->

<div class="form-grid">
    <div class="input-group">
        <label>Nopeg</label>
        <input type="text" id="nopeg">
    </div>

```
<div class="input-group">
    <label>NIK</label>
    <input type="text" id="nik">
</div>

<div class="input-group">
    <label>NPWP</label>
    <input type="text" id="npwp">
</div>

<div class="input-group">
    <label>Nama</label>
    <input type="text" id="nama">
</div>

<div class="input-group">
    <label>Jenis Kelamin</label>
    <select id="jenis_kelamin">
        <option value="L">Laki-laki</option>

<div class="input-group">

```

</div>

<button class="save-btn" onclick="savePayroll()">Simpan</button>

<!-- TABLE -->

<table>
    <thead>
        <tr>
            <th>Nopeg</th>
            <th>NIK</th>
            <th>NPWP</th>
            <th>Nama</th>
            <th>Jenis Kelamin</th>
            <th>Alamat</th>
            <th>PTKP</th>
            <th>TMT</th>
            <th>Project</th>
        </tr>
    </thead>
    <tbody id="payrollTable"></tbody>
</table>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxmjQuQ5kKMJwlijnDaXoBuTum0EZ16QOGVCdU37T_9hZ7Kh8po9Y4Fh3xMYmSIc6PjCw/exec";

// LOAD DATA
async function loadPayroll(){
    try{
        const res = await fetch(API_URL + "?action=getPayroll");
        const result = await res.json();

        console.log("LOAD:", result);

        if(!result.success){
            alert(result.message || "Gagal ambil data");
            return;
        }

        let rows = "";

        result.data.forEach(item=>{
            rows += `
            <tr>
                <td>${item[0] || ""}</td>
                <td>${item[1] || ""}</td>
                <td>${item[2] || ""}</td>
                <td>${item[3] || ""}</td>
                <td>${item[4] || ""}</td>
                <td>${item[5] || ""}</td>
                <td>${item[6] || ""}</td>
                <td>${item[7] || ""}</td>
                <td>${item[8] || ""}</td>
            </tr>`;
        });

        document.getElementById("payrollTable").innerHTML = rows;

    }catch(err){
        console.error(err);
        alert("Gagal load data (cek API)");
    }
}

// SAVE DATA
async function savePayroll(){

    const formData = new URLSearchParams();
    formData.append("action","savePayroll");

    formData.append("nopeg", document.getElementById("nopeg").value);
    formData.append("nik", document.getElementById("nik").value);
    formData.append("npwp", document.getElementById("npwp").value);
    formData.append("nama", document.getElementById("nama").value);
    formData.append("jenis_kelamin", document.getElementById("jenis_kelamin").value);
    formData.append("alamat", document.getElementById("alamat").value);
    formData.append("ptkp", document.getElementById("ptkp").value);
    formData.append("tmt", document.getElementById("tmt").value);
    formData.append("project", document.getElementById("project").value);

    try{
        const res = await fetch(API_URL,{
            method:"POST",
            body:formData
        });

        const result = await res.json();
        console.log("SAVE:", result);

        if(result.success){
            alert("Data berhasil disimpan");
            clearForm();
            loadPayroll();
        }else{
            alert(result.message || "Gagal simpan");
        }

    }catch(err){
        console.error(err);
        alert("Gagal koneksi ke server");
    }
}

// CLEAR FORM
function clearForm(){
    document.querySelectorAll("input").forEach(i=>i.value="");
    document.getElementById("jenis_kelamin").value = "L";
}

// INIT
window.onload = loadPayroll;

</script>

</body>
</html>
