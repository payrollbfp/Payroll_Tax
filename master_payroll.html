<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Payroll Lengkap</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Segoe UI;background:#eef2f7;padding:20px;}
button{padding:10px 14px;margin:5px;border:none;border-radius:6px;cursor:pointer;}
.btn-preview{background:#3b82f6;color:white;}
.btn-save{background:#10b981;color:white;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{border:1px solid #ddd;padding:8px;font-size:12px;}
th{background:#334155;color:white;}
</style>
</head>

<body>

<h2>Upload Master Payroll (Lengkap)</h2>

<input type="file" id="fileInput"><br>
<button class="btn-preview" onclick="previewFile()">Preview</button>
<button class="btn-save" onclick="saveData()">Save</button>

<p id="loading" style="display:none;color:blue;">⏳ Processing...</p>

<table>
<thead>
<tr>
<th>Nopeg</th>
<th>NIK</th>
<th>NPWP</th>
<th>Nama</th>
<th>JK</th>
<th>Alamat</th>
<th>Status Pajak</th>
<th>TMT</th>
<th>Project</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
const SUPABASE_URL = "https://nwrbjbwjmkahjuuyizfq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53cmJqYndqbWthaGp1dXlpemZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjM4OTIsImV4cCI6MjA5MjQ5OTg5Mn0.n67pONlkoMqZguyoTwQQFJ0VBRfPaIVuVlPGxsajaGA";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let uploadData = [];

/* NORMALIZE */
function normalizeStatusPajak(status){
    return String(status || '')
        .trim()
        .toUpperCase()
        .replace(/\s+/g,'')
        .replace('TK0','TK/0')
        .replace('TK1','TK/1')
        .replace('TK2','TK/2')
        .replace('TK3','TK/3')
        .replace('K0','K/0')
        .replace('K1','K/1')
        .replace('K2','K/2')
        .replace('K3','K/3');
}

/* FORMAT DATE */
function formatDate(value){
    if(!value) return null;

    if(typeof value === 'number'){
        const date = new Date((value-25569)*86400*1000);
        return date.toISOString().split('T')[0];
    }

    const d = new Date(value);
    if(isNaN(d)) return null;

    return d.toISOString().split('T')[0];
}

/* PREVIEW */
function previewFile(){
    const file = document.getElementById("fileInput").files[0];
    if(!file) return alert("Pilih file Excel");

    const reader = new FileReader();

    reader.onload = function(e){
        const workbook = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const raw = XLSX.utils.sheet_to_json(sheet);

        uploadData = raw.map(row => ({
            nopeg: row.Nopeg || row.NOPEG || null,
            nik: row.NIK || null,
            npwp: row.NPWP || null,
            nama: row.Nama || row.NAMA || null,
            jenis_kelamin: row["Jenis Kelamin"] || row["JENIS KELAMIN"] || null,
            alamat: row.Alamat || row.ALAMAT || null,
            status_pajak: normalizeStatusPajak(row["Status Pajak"] || ''),
            tmt: formatDate(row.TMT),
            project: row.Project || row.PROJECT || null
        }));

        console.log("DATA:", uploadData);
        renderTable();
    };

    reader.readAsArrayBuffer(file);
}

/* SAVE */
async function saveData(){
    if(uploadData.length === 0){
        alert("Tidak ada data");
        return;
    }

    loading(true);

    const chunkSize = 100;

    for(let i=0;i<uploadData.length;i+=chunkSize){
        const chunk = uploadData.slice(i,i+chunkSize);

        const { error } = await supabaseClient
            .from("master_payroll")
            .insert(chunk);

        if(error){
            console.error(error);
            alert("Error: " + error.message);
            loading(false);
            return;
        }
    }

    loading(false);
    alert("Berhasil simpan semua data!");
}

/* RENDER */
function renderTable(){
    let html = "";

    uploadData.forEach(d=>{
        html += `
        <tr>
            <td>${d.nopeg||''}</td>
            <td>${d.nik||''}</td>
            <td>${d.npwp||''}</td>
            <td>${d.nama||''}</td>
            <td>${d.jenis_kelamin||''}</td>
            <td>${d.alamat||''}</td>
            <td>${d.status_pajak||''}</td>
            <td>${d.tmt||''}</td>
            <td>${d.project||''}</td>
        </tr>`;
    });

    document.getElementById("table").innerHTML = html;
}

/* LOADING */
function loading(x){
    document.getElementById("loading").style.display = x ? "block":"none";
}
</script>

</body>
</html>
