<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzlxD3KY7Tl8HHl6Eo_C0Wt5EGDn_nvVC5IN35vjkkddD_uO7zJML8V1lz4Oo5nzGs/exec";
let payrollData = [];

window.onload = function () {
    const excelInput = document.getElementById("excelFile");
    if (excelInput) {
        excelInput.addEventListener("change", handleFile);
    }
};

function handleFile(e){
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){
        try {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            payrollData = XLSX.utils.sheet_to_json(sheet, { header: 1 });

            renderPreview();
        } catch(err){
            showError("Format file Excel tidak valid");
            console.error(err);
        }
    };

    reader.readAsArrayBuffer(file);
}

function renderPreview(){
    let rows = "";

    payrollData.slice(1).forEach((row,index) => {
        rows += `
        <tr>
            <td>${row[0] || ""}</td>
            <td>${row[1] || ""}</td>
            <td>${row[2] || ""}</td>
            <td>${row[3] || ""}</td>
            <td>${row[4] || ""}</td>
            <td>${row[5] || ""}</td>
            <td>${row[14] || ""}</td>
            <td>${row[15] || ""}</td>
            <td>
                <button type="button" onclick="deleteRow(${index+1})">Delete</button>
            </td>
        </tr>`;
    });

    const previewTable = document.getElementById("previewTable");
    if(previewTable){
        previewTable.innerHTML = rows;
    }
}

function deleteRow(index){
    payrollData.splice(index,1);
    renderPreview();
}

function validatePayrollData(){
    let errors = [];

    payrollData.slice(1).forEach((row,index)=>{
        const rowNum = index + 2;

        const periode = row[0];
        const nopeg = row[1];
        const nik = row[2];
        const gaji = Number(row[3]) || 0;
        const tunjangan = Number(row[4]) || 0;
        const irregular = Number(row[5]) || 0;
        const potongan = Number(row[14]) || 0;
        const realisasi = Number(row[15]) || 0;

        if(!periode) errors.push(`Baris ${rowNum}: Periode kosong`);
        if(!nopeg) errors.push(`Baris ${rowNum}: Nopeg kosong`);
        if(!nik) errors.push(`Baris ${rowNum}: NIK kosong`);

        const calc = gaji + tunjangan + irregular - potongan;

        if(Math.abs(calc - realisasi) > 1){
            errors.push(`Baris ${rowNum}: Realisasi salah, harus ${calc}`);
        }
    });

    return errors;
}

async function savePayrollUpload(){
    clearError();

    if(payrollData.length <= 1){
        showError("Pilih file Excel terlebih dahulu");
        return;
    }

    const errors = validatePayrollData();

    if(errors.length > 0){
        showError("<b>Validasi gagal:</b><br>" + errors.join("<br>"));
        return;
    }

    try{
        const res = await fetch(API_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                action:"savePayrollUpload",
                data: payrollData.slice(1)
            })
        });

        const result = await res.json();

        if(result.success){
            alert("Upload payroll berhasil disimpan");
            payrollData = [];

            document.getElementById("previewTable").innerHTML = "";
            document.getElementById("excelFile").value = "";
        }else{
            showError(result.message || "Gagal menyimpan data");
        }

    }catch(err){
        showError("Gagal upload payroll");
        console.error(err);
    }
}

function downloadTemplate(){
    const templateData = [[
        "Periode",
        "Nopeg",
        "NIK",
        "Gaji Pokok",
        "Tunjangan",
        "Irregular",
        "BPJS4",
        "BPJS1",
        "JKK",
        "JKM",
        "JHT37",
        "JHT2",
        "JP2",
        "JP1",
        "Potongan",
        "Realisasi"
    ]];

    const ws = XLSX.utils.aoa_to_sheet(templateData);
    const wb = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(wb, ws, "Payroll Template");
    XLSX.writeFile(wb, "Template_Payroll_Input.xlsx");
}

function showError(msg){
    const errorBox = document.getElementById("errorBox");
    if(errorBox){
        errorBox.innerHTML = msg;
    }
}

function clearError(){
    const errorBox = document.getElementById("errorBox");
    if(errorBox){
        errorBox.innerHTML = "";
    }
}
</script>
