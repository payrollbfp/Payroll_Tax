<script>

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let payrollData = [];

/* ================= SAVE ================= */
async function saveData(){
    if(payrollData.length === 0){
        return alert("Tidak ada data untuk disimpan");
    }

    loading(true);

    const periode = payrollData[0].Periode;
    const newData = formatData();

    // ambil data existing pada periode yang sama
    const { data: existingData, error: fetchError } = await supabaseClient
        .from("payroll")
        .select("nik, periode")
        .eq("periode", periode);

    if(fetchError){
        loading(false);
        console.error(fetchError);
        return alert("❌ Gagal cek data existing");
    }

    // filter duplikat nik + periode
    const filteredData = newData.filter(newRow => {
        return !existingData.some(oldRow =>
            oldRow.nik === newRow.nik &&
            oldRow.periode === newRow.periode
        );
    });

    if(filteredData.length === 0){
        loading(false);
        return alert("⚠ Semua data sudah ada pada periode ini");
    }

    const { error: insertError } = await supabaseClient
        .from("payroll")
        .insert(filteredData);

    loading(false);

    if(insertError){
        console.error(insertError);
        alert("❌ Gagal simpan data");
    }else{
        alert(`✅ ${filteredData.length} data berhasil disimpan`);
        await loadPayrollDataByPeriod(periode);
    }
}

/* ================= LOAD DATA SETELAH SAVE ================= */
async function loadPayrollDataByPeriod(periode){
    loading(true);

    const { data, error } = await supabaseClient
        .from("payroll")
        .select("*")
        .eq("periode", periode);

    loading(false);

    if(error){
        console.error(error);
        return alert("❌ Gagal load data payroll");
    }

    payrollData = data.map(r => ({
        Periode: r.periode,
        Nopeg: r.nopeg,
        NIK: r.nik,
        "Gaji Pokok": r.gaji_pokok,
        Tunjangan: r.tunjangan,
        "Realisasi Gaji": r.realisasi,
        "Masa Terakhir": r.masa_terakhir,
        "BPJS 4%": r.bpjs4,
        "BPJS 1%": r.bpjs1,
        JKK: r.jkk,
        JKM: r.jkm,
        "JHT 3.7%": r.jht37,
        "JHT 2%": r.jht2,
        "JP 2%": r.jp2,
        "JP 1%": r.jp1,
        Potongan: r.potongan
    }));

    renderTable();
}
