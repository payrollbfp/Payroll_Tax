<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payroll Upload</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
    font-family:Arial;
    background:#6a85c9;
    padding:20px;
    color:white;
}
button{
    padding:10px;
    margin:10px 0;
}
table{
    width:100%;
    background:white;
    color:black;
}
td,th{
    padding:8px;
}
</style>
</head>

<body>

<h2>Payroll Upload</h2>

<input type="file" id="file">
<button onclick="save()">Save ke Database</button>

<table border="1">
<thead>
<tr>
<th>Periode</th>
<th>Nopeg</th>
<th>NIK</th>
<th>Gaji</th>
<th>Tunjangan</th>
<th>Irregular</th>
<th>BPJS4</th>
<th>BPJS1</th>
<th>JKK</th>
<th>JKM</th>
<th>JHT37</th>
<th>JHT2</th>
<th>JP2</th>
<th>JP1</th>
<th>Potongan</th>
<th>Realisasi</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>

<script>
// 🔥 GANTI DENGAN PUNYAMU
const supabaseUrl = "https://nwrbjbwjmkahjuuyizfq.supabase.co";
const supabaseKey = "sb_publishable_xxxxx";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let dataExcel = [];

// READ EXCEL
document.getElementById("file").addEventListener("change", e=>{
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = evt=>{
        const data = new Uint8Array(evt.target.result);
        const wb = XLSX.read(data, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];

        dataExcel = XLSX.utils.sheet_to_json(ws,{header:1});
        render();
    };

    reader.readAsArrayBuffer(file);
});

// TAMPILKAN
function render(){
    let html="";
    for(let i=1;i<dataExcel.length;i++){
        html+="<tr>";
        for(let j=0;j<16;j++){
            html+=`<td>${dataExcel[i][j]||""}</td>`;
        }
        html+="</tr>";
    }
    document.getElementById("tabel").innerHTML=html;
}

// SAVE
async function save(){

    if(dataExcel.length<=1){
        alert("Upload dulu!");
        return;
    }

    const payload = dataExcel.slice(1).map(r=>({
        periode:r[0],
        nopeg:r[1],
        nik:r[2],
        gaji_pokok:Number(r[3])||0,
        tunjangan:Number(r[4])||0,
        irregular:Number(r[5])||0,
        bpjs4:Number(r[6])||0,
        bpjs1:Number(r[7])||0,
        jkk:Number(r[8])||0,
        jkm:Number(r[9])||0,
        jht37:Number(r[10])||0,
        jht2:Number(r[11])||0,
        jp2:Number(r[12])||0,
        jp1:Number(r[13])||0,
        potongan:Number(r[14])||0,
        realisasi:Number(r[15])||0
    }));

    const {error} = await supabase
        .from("payroll")
        .insert(payload);

    if(error){
        console.error(error);
        alert("Gagal: "+error.message);
    }else{
        alert("Berhasil masuk database 🚀");
    }
}
</script>

</body>
</html>
