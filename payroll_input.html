<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Payroll Advanced</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: 'Segoe UI';
  background: #eef2f7;
  margin: 0;
}

.header {
  background: #1e293b;
  color: white;
  padding: 15px;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

button {
  border: none;
  padding: 8px 14px;
  margin: 4px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 500;
}

.btn-primary { background:#3b82f6; color:white; }
.btn-success { background:#10b981; color:white; }
.btn-danger { background:#ef4444; color:white; }
.btn-warning { background:#f59e0b; color:white; }

input {
  padding:6px;
  border:1px solid #ccc;
  border-radius:5px;
}

table {
  width:100%;
  border-collapse: collapse;
  margin-top:20px;
}

th, td {
  padding:8px;
  border:1px solid #ddd;
  font-size:12px;
}

th {
  background:#334155;
  color:white;
}

td input {
  width:100%;
  border:none;
  background:transparent;
}

.loading {
  display:none;
  color:#3b82f6;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <h2>Payroll Upload Advanced</h2>
</div>

<div class="container">
<div class="card">

<input type="file" id="fileInput" accept=".xlsx,.csv">
<button class="btn-primary" onclick="preview()">Preview</button>
<button class="btn-success" onclick="save()">Save</button>
<button class="btn-warning" onclick="replaceData()">Replace Data</button>

<p class="loading" id="loading">⏳ Processing...</p>

<table>
<thead>
<tr>
<th>Periode</th>
<th>Nopeg</th>
<th>NIK</th>
<th>Gaji</th>
<th>Tunjangan</th>
<th>Realisasi</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>
</div>

<script>
/* ================= CONFIG ================= */
const SUPABASE_URL = "https://nwrbjbwjmkahjuuyizfq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53cmJqYndqbWthaGp1dXlpemZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjM4OTIsImV4cCI6MjA5MjQ5OTg5Mn0.n67pONlkoMqZguyoTwQQFJ0VBRfPaIVuVlPGxsajaGA";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ================= STATE ================= */
let dataGlobal = [];

/* ================= PREVIEW ================= */
function preview() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Pilih file");

  document.getElementById("loading").style.display = "block";

  const reader = new FileReader();
  reader.onload = (e) => {
    const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    dataGlobal = validateData(json);
    render();

    document.getElementById("loading").style.display = "none";
  };

  reader.readAsArrayBuffer(file);
}

/* ================= VALIDATION ================= */
function validateData(data) {
  const seen = new Set();

  return data.filter(row => {
    if (!row.Periode || !row.Nopeg) return false;

    const key = row.Periode + "-" + row.Nopeg;

    if (seen.has(key)) return false;
    seen.add(key);

    return true;
  });
}

/* ================= RENDER ================= */
function render() {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  dataGlobal.forEach((row, i) => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td><input value="${row.Periode || ''}" onchange="edit(${i},'Periode',this.value)"></td>
      <td><input value="${row.Nopeg || ''}" onchange="edit(${i},'Nopeg',this.value)"></td>
      <td><input value="${row.NIK || ''}" onchange="edit(${i},'NIK',this.value)"></td>
      <td><input value="${row["Gaji Pokok"] || 0}" onchange="edit(${i},'Gaji Pokok',this.value)"></td>
      <td><input value="${row.Tunjangan || 0}" onchange="edit(${i},'Tunjangan',this.value)"></td>
      <td><input value="${row["Realisasi Gaji"] || 0}" onchange="edit(${i},'Realisasi Gaji',this.value)"></td>
      <td><button class="btn-danger" onclick="del(${i})">Delete</button></td>
    `;

    tbody.appendChild(tr);
  });
}

/* ================= EDIT ================= */
function edit(index, field, value) {
  dataGlobal[index][field] = value;
}

/* ================= DELETE ================= */
function del(index) {
  dataGlobal.splice(index,1);
  render();
}

/* ================= FORMAT ================= */
function formatData() {
  return dataGlobal.map(r => ({
    periode: r.Periode,
    nopeg: r.Nopeg,
    nik: r.NIK,
    gaji_pokok: Number(r["Gaji Pokok"] || 0),
    tunjangan: Number(r.Tunjangan || 0),
    irregular: Number(r["Irregular Income"] || 0),
    bpjs4: Number(r["BPJS 4%"] || 0),
    bpjs1: Number(r["BPJS 1%"] || 0),
    jkk: Number(r.JKK || 0),
    jkm: Number(r.JKM || 0),
    jht37: Number(r["JHT 3.7%"] || 0),
    jht2: Number(r["JHT 2%"] || 0),
    jp2: Number(r["JP 2%"] || 0),
    jp1: Number(r["JP 1%"] || 0),
    potongan: Number(r.Potongan || 0),
    realisasi: Number(r["Realisasi Gaji"] || 0)
  }));
}

/* ================= SAVE ================= */
async function save() {
  document.getElementById("loading").style.display = "block";

  const payload = formatData();

  const { error } = await supabaseClient
    .from("payroll")
    .insert(payload);

  document.getElementById("loading").style.display = "none";

  if (error) {
    console.error(error);
    alert("❌ Gagal simpan");
  } else {
    alert("✅ Berhasil simpan");
  }
}

/* ================= REPLACE ================= */
async function replaceData() {
  if (!confirm("Yakin replace semua data?")) return;

  document.getElementById("loading").style.display = "block";

  await supabaseClient.from("payroll").delete().neq("id", 0);

  await save();

  document.getElementById("loading").style.display = "none";
}
</script>

</body>
</html>
