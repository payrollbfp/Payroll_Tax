<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payroll Input Upload</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"California FB", serif;
}
body{
    min-height:100vh;
    background:linear-gradient(135deg,#d9918f,#6a85c9);
    padding:30px;
    color:white;
}
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    padding:20px 30px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
}
.container{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:25px;
}
input[type=file]{
    padding:10px;
    background:white;
    color:#123;
    border-radius:8px;
}
button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:white;
    color:#123;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
    margin-right:10px;
}
table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    background:rgba(255,255,255,0.1);
}
th,td{
    padding:10px;
    text-align:left;
    border-bottom:1px solid rgba(255,255,255,0.2);
}
th{
    background:rgba(255,255,255,0.2);
}
#errorBox{
    margin-top:15px;
    color:yellow;
    font-size:14px;
}
</style>
</head>
<body>

<div class="header">
    <h1>Payroll Input Upload</h1>
    <button onclick="window.location.href='dashboard.html'">Back</button>
</div>

<div class="container">

    <input type="file" id="excelFile" accept=".xlsx,.xls">
    <button onclick="savePayrollUpload()">Save Payroll</button>

    <div id="errorBox"></div>

    <table>
        <thead>
            <tr>
                <th>Periode</th>
                <th>Nopeg</th>
                <th>NIK</th>
                <th>Gaji Pokok</th>
                <th>Tunjangan</th>
                <th>Irregular</th>
                <th>Potongan</th>
                <th>Realisasi</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="previewTable"></tbody>
    </table>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzlxD3KY7Tl8HHl6Eo_C0Wt5EGDn_nvVC5IN35vjkkddD_uO7zJML8V1lz4Oo5nzGs/exec";
let payrollData = [];

document.getElementById("excelFile").addEventListener("change", handleFile);

function handleFile(e){
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){
        const data = new Uint8Array(event.target.result);
        const workbook = XLSX.read(data, {type:'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        payrollData = XLSX.utils.sheet_to_json(sheet, {header:1});

        renderPreview();
    };

    reader.readAsArrayBuffer(file);
}

function renderPreview(){
    let rows = "";

    payrollData.slice(1).forEach(row => {
        rows += `
        <tr>
            <td>${row[0] || ""}</td>
            <td>${row[1] || ""}</td>
            <td>${row[2] || ""}</td>
            <td>${row[3] || ""}</td>
            <td>${row[4] || ""}</td>
            <td>${row[5] || ""}</td>
            <td>${row[14] || ""}</td>
            <td>${row[15] || ""}</td>
        </tr>`;
    });

    document.getElementById("previewTable").innerHTML = rows;
}

function validatePayrollData(){
    let errors = [];

    payrollData.slice(1).forEach((row,index)=>{
        const rowNum = index + 2;

        const periode = row[0];
        const nopeg = row[1];
        const nik = row[2];
        const gaji = Number(row[3]) || 0;
        const tunjangan = Number(row[4]) || 0;
        const irregular = Number(row[5]) || 0;
        const potongan = Number(row[14]) || 0;
        const realisasi = Number(row[15]) || 0;

        if(!periode) errors.push(`Baris ${rowNum}: Periode kosong`);
        if(!nopeg) errors.push(`Baris ${rowNum}: Nopeg kosong`);
        if(!nik) errors.push(`Baris ${rowNum}: NIK kosong`);

        if(isNaN(Number(row[3]))) errors.push(`Baris ${rowNum}: Gaji Pokok harus angka`);
        if(isNaN(Number(row[4]))) errors.push(`Baris ${rowNum}: Tunjangan harus angka`);
        if(isNaN(Number(row[5]))) errors.push(`Baris ${rowNum}: Irregular harus angka`);
        if(isNaN(Number(row[14]))) errors.push(`Baris ${rowNum}: Potongan harus angka`);
        if(isNaN(Number(row[15]))) errors.push(`Baris ${rowNum}: Realisasi harus angka`);

async function savePayrollUpload(){

    document.getElementById("errorBox").innerHTML = "";

    if(payrollData.length <= 1){
        document.getElementById("errorBox").innerHTML = "Pilih file Excel terlebih dahulu";
        return;
    }
    function renderPreview(){
    let rows = "";

    payrollData.slice(1).forEach((row, index) => {
        rows += `
        <tr>
            <td>${row[0] || ""}</td>
            <td>${row[1] || ""}</td>
            <td>${row[2] || ""}</td>
            <td>${row[3] || ""}</td>
            <td>${row[4] || ""}</td>
            <td>${row[5] || ""}</td>
            <td>${row[14] || ""}</td>
            <td>${row[15] || ""}</td>
            <td>
                <button onclick="deleteRow(${index})" style="background:#ff6b6b;color:white;">
                    Hapus
                </button>
            </td>
        </tr>`;
    });

    document.getElementById("previewTable").innerHTML = rows;
}
    function deleteRow(index){
    if(confirm("Yakin ingin menghapus baris ini?")){
        // +1 karena slice(1) (skip header)
        payrollData.splice(index + 1, 1);

        renderPreview();
    }
}

    const errors = validatePayrollData();

    if(errors.length > 0){
        document.getElementById("errorBox").innerHTML =
            "<b>Validasi gagal:</b><br>" + errors.join("<br>");
        return;
    }

    try{
        const res = await fetch(API_URL,{
            method:"POST",
            body: JSON.stringify({
                action:"savePayrollUpload",
                data: payrollData.slice(1)
            })
        });

        const result = await res.json();

        if(result.success){
            alert("Upload payroll berhasil disimpan");
            payrollData = [];
            document.getElementById("previewTable").innerHTML = "";
            document.getElementById("excelFile").value = "";
        }else{
            document.getElementById("errorBox").innerHTML = result.message;
        }

    }catch(err){
        document.getElementById("errorBox").innerHTML = "Gagal upload payroll";
        console.error(err);
    }
}
</script>

</body>
</html>
