<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payroll Input Upload</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"California FB", serif;
}
body{
    min-height:100vh;
    background:linear-gradient(135deg,#d9918f,#6a85c9);
    padding:30px;
    color:white;
}
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    padding:20px 30px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
}
.container{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:25px;
}
input[type=file]{
    padding:10px;
    background:white;
    color:#123;
    border-radius:8px;
}
button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:white;
    color:#123;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
    margin-right:10px;
}
table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    background:rgba(255,255,255,0.1);
}
th,td{
    padding:10px;
    border-bottom:1px solid rgba(255,255,255,0.2);
}
th{
    background:rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div id="topRealisasi" style="margin-bottom:15px;padding:15px;background:rgba(255,255,255,0.15);border-radius:15px;font-weight:bold;">
    Total Realisasi: Rp 0
</div>

<div class="header">
    <h1>Payroll Input Upload</h1>
</div>

<div class="container">

    <input type="file" id="excelFile" accept=".xlsx,.xls">
    <button onclick="savePayroll()">Save Payroll</button>

    <table>
        <thead>
            <tr>
                <th>Periode</th>
                <th>Nopeg</th>
                <th>NIK</th>
                <th>Gaji Pokok</th>
                <th>Tunjangan</th>
                <th>Irregular Income</th>
                <th>BPJS 4%</th>
                <th>BPJS 1%</th>
                <th>JKK</th>
                <th>JKM</th>
                <th>JHT 3.7%</th>
                <th>JHT 2%</th>
                <th>JP 2%</th>
                <th>JP 1%</th>
                <th>Potongan</th>
                <th>Realisasi Gaji</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="previewTable"></tbody>
    </table>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzlxD3KY7Tl8HHl6Eo_C0Wt5EGDn_nvVC5IN35vjkkddD_uO7zJML8V1lz4Oo5nzGs/exec";

let payrollData = [];

// UPLOAD EXCEL
document.getElementById("excelFile").addEventListener("change", function(e){

    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(evt){
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data, {type:'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];

        payrollData = XLSX.utils.sheet_to_json(sheet, {
            header:1,
            defval:""
        });

        console.log("DATA:", payrollData);

        renderPreview();
        hitungTotal();
    };

    reader.readAsArrayBuffer(file);
});

// RENDER TABLE
function renderPreview(){
    let html = "";

    for(let i = 1; i < payrollData.length; i++){
        const row = payrollData[i];

        html += "<tr>";

        for(let j = 0; j <= 15; j++){
            html += `<td>${row[j] || ""}</td>`;
        }

        html += `<td><button onclick="deleteRow(${i-1})" style="background:red;color:white;">Hapus</button></td>`;
        html += "</tr>";
    }

    document.getElementById("previewTable").innerHTML = html;
}

// DELETE ROW
function deleteRow(index){
    payrollData.splice(index + 1, 1);
    renderPreview();
    hitungTotal();
}

// HITUNG TOTAL
function hitungTotal(){
    let total = 0;

    for(let i = 1; i < payrollData.length; i++){
        total += Number(payrollData[i][15]) || 0;
    }

    document.getElementById("topRealisasi").innerHTML =
        "Total Realisasi: Rp " + total.toLocaleString("id-ID");
}

// SAVE
async function savePayroll(){

    if(payrollData.length <= 1){
        alert("Upload data dulu");
        return;
    }

    try{
        const res = await fetch(API_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                action:"savePayrollUpload",
                data: payrollData.slice(1)
            })
        });

        const text = await res.text();
        console.log("RESPONSE:", text);

        let result = JSON.parse(text);

        if(result.success){
            alert("Data berhasil disimpan");
        }else{
            alert("Error: " + result.message);
        }

    }catch(err){
        console.error(err);
        alert("Error koneksi ke server");
    }
}

</script>

</body>
</html>
