<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payroll Upload</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
    font-family:Arial;
    padding:20px;
    background:#6a85c9;
    color:white;
}
table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}
th,td{
    padding:8px;
    border:1px solid #ddd;
}
button{
    padding:6px 10px;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>Upload Payroll</h2>

<input type="file" id="excelFile" accept=".xlsx,.xls">

<div id="errorBox"></div>

<table>
    <thead>
        <tr>
            <th>Periode</th>
            <th>Nopeg</th>
            <th>NIK</th>
            <th>Gaji Pokok</th>
            <th>Tunjangan</th>
            <th>Irregular Income</th>
            <th>Potongan</th>
            <th>Realisasi Gaji</th>
            <th>Aksi</th>
        </tr>
    </thead>
    <tbody id="previewTable"></tbody>
</table>

<script>

let payrollData = [];

document.getElementById("excelFile").addEventListener("change", handleFile);

function handleFile(e){
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){
        try{
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type:'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];

            payrollData = XLSX.utils.sheet_to_json(sheet, {header:1});

            console.log("Data:", payrollData);

            renderPreview();

        }catch(err){
            console.error(err);
            document.getElementById("errorBox").innerHTML = "Gagal membaca file";
        }
    };

    reader.readAsArrayBuffer(file);
}

function renderPreview(){
    let rows = "";

    payrollData.slice(1).forEach((row, index) => {
        rows += `
        <tr>
            <td>${row[0] || ""}</td>
            <td>${row[1] || ""}</td>
            <td>${row[2] || ""}</td>
            <td>${row[3] || ""}</td>
            <td>${row[4] || ""}</td>
            <td>${row[5] || ""}</td>
            <td>${row[14] || ""}</td>
            <td>${row[15] || ""}</td>
            <td>
                <button onclick="deleteRow(${index})" style="background:red;color:white;">
                    Hapus
                </button>
            </td>
        </tr>`;
    });

    document.getElementById("previewTable").innerHTML = rows;
}

function deleteRow(index){
    if(confirm("Hapus baris ini?")){
        payrollData.splice(index + 1, 1);
        renderPreview();
    }
}

</script>

</body>
</html>
