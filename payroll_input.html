<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payroll Final</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family:Segoe UI,sans-serif;
    background:#eef2f7;
    margin:0;
}
.header{
    background:#1e293b;
    color:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.container{
    padding:20px;
}
.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,0,0,0.1);
}
button{
    border:none;
    padding:8px 12px;
    margin:4px;
    border-radius:6px;
    cursor:pointer;
}
.btn1{background:#3b82f6;color:white;}
.btn2{background:#10b981;color:white;}
.btn3{background:#f59e0b;color:white;}
.btn4{background:#ef4444;color:white;}
.btnBack{background:#64748b;color:white;}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
th,td{
    padding:8px;
    border:1px solid #ddd;
    font-size:12px;
}
th{
    background:#334155;
    color:white;
}
.detail-box{
    background:#f1f5f9;
    padding:10px;
    border-radius:8px;
    line-height:1.6;
}
.loading{
    display:none;
    color:#3b82f6;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="header">
    <h2>Payroll System</h2>
    <button class="btnBack" onclick="goDashboard()">Back</button>
</div>

<div class="container">
<div class="card">

<input type="file" id="fileInput">
<button class="btn1" onclick="previewFile()">Preview</button>
<button class="btn2" onclick="saveData()">Save</button>
<button class="btn3" onclick="replaceByPeriod()">Replace Periode</button>

<p id="loading" class="loading">⏳ Processing...</p>

<table>
<thead>
<tr>
    <th>Periode</th>
    <th>Nopeg</th>
    <th>NIK</th>
    <th>Gaji</th>
    <th>Tunjangan</th>
    <th>Realisasi</th>
    <th>Masa Terakhir</th>
    <th>Detail</th>
    <th>Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>
</div>

<script>
const SUPABASE_URL = "https://nwrbjbwjmkahjuuyizfq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53cmJqYndqbWthaGp1dXlpemZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjM4OTIsImV4cCI6MjA5MjQ5OTg5Mn0.n67pONlkoMqZguyoTwQQFJ0VBRfPaIVuVlPGxsajaGA";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let payrollData = [];

/* ================= BACK ================= */
function goDashboard(){
    window.location.href = "dashboard.html";
}

/* ================= PREVIEW FILE ================= */
function previewFile(){
    const file = document.getElementById("fileInput").files[0];
    if(!file) return alert("Pilih file Excel");

    loading(true);

    const reader = new FileReader();
    reader.onload = function(e){
        const workbook = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        payrollData = XLSX.utils.sheet_to_json(sheet);

        if(payrollData.length === 0){
            loading(false);
            return alert("File kosong");
        }

        const periodeAwal = payrollData[0].Periode;
        const bedaPeriode = payrollData.some(r => r.Periode !== periodeAwal);

        if(bedaPeriode){
            loading(false);
            return alert("Semua data dalam file harus periode yang sama");
        }

        renderTable(payrollData);
        loading(false);
    };
    reader.readAsArrayBuffer(file);
}

/* ================= RENDER TABLE ================= */
function renderTable(data){
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    data.forEach((row, index) => {
        tbody.innerHTML += `
        <tr>
            <td>${row.Periode || ''}</td>
            <td>${row.Nopeg || ''}</td>
            <td>${row.NIK || ''}</td>
            <td>${row["Gaji Pokok"] || 0}</td>
            <td>${row.Tunjangan || 0}</td>
            <td>${row["Realisasi Gaji"] || 0}</td>
            <td>${row["Masa Terakhir"] || row.Periode || ''}</td>
            <td><button onclick="toggleDetail(${index})">Detail</button></td>
            <td><button class="btn4" onclick="deleteRow(${index})">Delete</button></td>
        </tr>
        <tr id="detail-${index}" style="display:none">
            <td colspan="9">
                <div class="detail-box">
                    BPJS 4%: ${row["BPJS 4%"] || 0} |
                    BPJS 1%: ${row["BPJS 1%"] || 0} |
                    JKK: ${row.JKK || 0} |
                    JKM: ${row.JKM || 0}
                </div>
            </td>
        </tr>`;
    });
}

/* ================= DETAIL ================= */
function toggleDetail(index){
    const row = document.getElementById(`detail-${index}`);
    row.style.display = row.style.display === "none" ? "table-row" : "none";
}

/* ================= DELETE ================= */
function deleteRow(index){
    payrollData.splice(index,1);
    renderTable(payrollData);
}

/* ================= FORMAT DATA ================= */
function formatData(){
    return payrollData.map(r => ({
        periode: r.Periode || '',
        nopeg: r.Nopeg || '',
        nik: r.NIK || '',
        gaji_pokok: Number(r["Gaji Pokok"]) || 0,
        tunjangan: Number(r.Tunjangan) || 0,
        realisasi: Number(r["Realisasi Gaji"]) || 0,
        masa_terakhir: r["Masa Terakhir"] || r.Periode || ''
    }));
}

/* ================= LOAD DATABASE ================= */
async function loadPayrollData(periode){
    const { data, error } = await supabaseClient
        .from("payroll")
        .select("*")
        .eq("periode", periode);

    if(error){
        console.error(error);
        return;
    }

    const rows = data.map(r => ({
        Periode: r.periode,
        Nopeg: r.nopeg,
        NIK: r.nik,
        "Gaji Pokok": r.gaji_pokok,
        Tunjangan: r.tunjangan,
        "Realisasi Gaji": r.realisasi,
        "Masa Terakhir": r.masa_terakhir
    }));

    payrollData = rows;
    renderTable(payrollData);
}

/* ================= SAVE ================= */
async function saveData(){
    if(payrollData.length === 0){
        return alert("Tidak ada data preview");
    }

    loading(true);

    const periode = payrollData[0].Periode;

    const { data: existing, error: checkError } = await supabaseClient
        .from("payroll")
        .select("nik")
        .eq("periode", periode);

    if(checkError){
        loading(false);
        return alert("Gagal cek data lama");
    }

    const existingNik = existing.map(x => x.nik);
    const newRows = formatData();

    const duplicateNik = newRows.filter(row => existingNik.includes(row.nik));

    if(duplicateNik.length > 0){
        loading(false);
        return alert("❌ Upload gagal, ada NIK duplicate pada periode ini: " + duplicateNik.map(x => x.nik).join(", "));
    }

    const { error } = await supabaseClient
        .from("payroll")
        .insert(newRows);

    loading(false);

    if(error){
        console.error(error);
        alert("❌ Gagal simpan data");
    }else{
        alert("✅ Data berhasil disimpan");
        loadPayrollData(periode);
    }
}

/* ================= REPLACE ================= */
async function replaceByPeriod(){
    if(payrollData.length === 0){
        return alert("Tidak ada data preview");
    }

    const periode = payrollData[0].Periode;

    loading(true);

    await supabaseClient
        .from("payroll")
        .delete()
        .eq("periode", periode);

    const { error } = await supabaseClient
        .from("payroll")
        .insert(formatData());

    loading(false);

    if(error){
        alert("❌ Gagal replace data");
    }else{
        alert("✅ Replace berhasil");
        loadPayrollData(periode);
    }
}

/* ================= LOADING ================= */
function loading(show){
    document.getElementById("loading").style.display = show ? "block" : "none";
}
</script>

</body>
</html>
