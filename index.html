<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payroll Tax Login</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #d9918f, #6a85c9);
    }

    .container {
        position: relative;
        width: 380px;
        padding-top: 50px;
    }

    .login-box {
        background: rgba(255,255,255,0.25);
        backdrop-filter: blur(10px);
        padding: 70px 30px 30px;
        border-radius: 25px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        position: relative;
    }

    .avatar {
        width: 90px;
        height: 90px;
        background: #0d3b66;
        border-radius: 50%;
        position: absolute;
        top: -45px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 40px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .input-box {
        display: flex;
        align-items: center;
        background: rgba(13,59,102,0.75);
        margin-bottom: 15px;
        border-radius: 5px;
        padding: 12px;
    }

    .input-box span {
        color: white;
        margin-right: 10px;
        font-size: 18px;
    }

    .input-box input {
        border: none;
        outline: none;
        background: transparent;
        color: white;
        width: 100%;
        font-size: 14px;
    }

    .input-box input::placeholder {
        color: #d8d8d8;
    }

    .options {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        margin: 10px 0 20px;
        color: #123;
    }

    .options a {
        text-decoration: none;
        color: #2f4f6f;
    }

    .login-btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(to bottom, #d9e6f2, #9bb8d6);
        color: #123;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 5px 10px rgba(0,0,0,0.15);
    }

    .message {
        margin-top: 15px;
        text-align: center;
        color: red;
        font-size: 14px;
    }
</style>
</head>
<body>

<div class="container">
    <div class="login-box">
        <div class="avatar">👤</div>

        <div class="input-box">
            <span>👤</span>
            <input type="text" id="username" placeholder="Username">
        </div>

        <div class="input-box">
            <span>🔒</span>
            <input type="password" id="password" placeholder="Password">
        </div>

        <div class="options">
            <label><input type="checkbox"> Remember me</label>
            <a href="#">Forgot Password?</a>
        </div>

        <button class="login-btn" onclick="login()">LOGIN</button>
        <div class="message" id="message"></div>
    </div>
</div>

<script>
async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const message = document.getElementById("message");

    message.innerText = "Checking login...";

    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRGsLTaiWjm92xKKh8OoVqbtT-nJysgrBBX0jswX6yvSlxH2PQcnCWWlv5e4POicZ3N4D2tx_yAKmcu/pubhtml?gid=1812015916&single=true" 
        + encodeURIComponent(username) 
        + "&password=" 
        + encodeURIComponent(password);

    try {
        const response = await fetch(url);
        const result = await response.json();

        if (result.success === true) {
            message.style.color = "green";
            message.innerText = "Login berhasil...";
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 500);
        } else {
            message.style.color = "red";
            message.innerText = "Username atau password salah";
        }

    } catch (error) {
        console.error(error);
        message.style.color = "red";
        message.innerText = "Gagal terhubung ke server";
    }
}
</script>

</body>
</html>
