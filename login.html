<!DOCTYPE html>
<html>
<head>
  <title>Login Payroll Tax</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f4f4f4;
    }
    .login-box {
      background: white;
      padding: 30px;
      width: 300px;
      box-shadow: 0 0 10px #ccc;
      border-radius: 10px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Payroll Tax Login</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="message"></p>
</div>

<script>
async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const url = "https://script.google.com/a/macros/bintangfajarpersada.com/s/AKfycbxNYCArGktOSMtEiAP1hw3aE_OU27W26K_GUMJuaUnkwFFdfBG-pCNhYrQNi5LBHIsacw/exec?action=login&username=" + username + "&password=" + password;

  const response = await fetch(url, { method: "POST" });
  const result = await response.json();

  if (result.success) {
    localStorage.setItem("username", result.username);
    localStorage.setItem("role", result.role);
    window.location.href = "dashboard.html";
  } else {
    document.getElementById("message").innerText = result.message;
  }
}
</script>

</body>
</html>
