<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payroll System Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#f4f6f9;
    min-height:100vh;
}

/* HEADER */
.header{
    background:#1f2d3d;
    color:white;
    padding:20px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h1{
    font-size:26px;
}

.logout-btn{
    padding:10px 16px;
    border:none;
    border-radius:5px;
    background:#e74c3c;
    color:white;
    cursor:pointer;
    font-weight:bold;
}
.logout-btn:hover{ background:#c0392b; }

/* CONTENT */
.container{ padding:30px; }

.dashboard-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:white;
    border-radius:10px;
    padding:25px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    cursor:pointer;
    transition:0.25s;
    border-top:4px solid #2c3e50;
}

.card:hover{
    transform:translateY(-4px);
    box-shadow:0 6px 16px rgba(0,0,0,0.15);
}

.icon{
    font-size:32px;
    margin-bottom:10px;
}

.card h2{
    font-size:18px;
    margin-bottom:6px;
    color:#2c3e50;
}

.card p{
    font-size:13px;
    color:#666;
}
</style>
</head>

<body>

<div class="header">
    <h1>Payroll System</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container">
    <div class="dashboard-grid">

        <div class="card" onclick="go('master_payroll.html')">
            <div class="icon">👥</div>
            <h2>Master Database Pajak</h2>
            <p>Kelola database pajak karyawan</p>
        </div>

        <div class="card" onclick="go('payroll_input.html')">
            <div class="icon">💰</div>
            <h2>Payroll Input</h2>
            <p>Input komponen gaji</p>
        </div>

        <div class="card" onclick="go('tax_engine.html')">
            <div class="icon">🧾</div>
            <h2>Tax Engine</h2>
            <p>Perhitungan PPh21</p>
        </div>

        <!-- 🔥 REPORT TERHUBUNG -->
        <div class="card" onclick="go('report.html')">
            <div class="icon">📊</div>
            <h2>Report</h2>
            <p>Laporan PPh21 & Master Payroll</p>
        </div>

    </div>
</div>

<script>
function logout(){
    window.location.href = "index.html";
}

function go(page){
    window.location.href = page;
}
</script>

</body>
</html>
