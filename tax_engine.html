<script>

)

let hasil = []

// ================= PERIODE DINAMIS =================
function generatePeriode(){
    let select = document.getElementById("periode")
    select.innerHTML = ""

    let now = new Date()
    let currentYear = now.getFullYear()
    let currentMonth = now.getMonth()+1

    for(let y=currentYear-2;y<=currentYear+3;y++){
        for(let m=1;m<=12;m++){
            let mm = m.toString().padStart(2,'0')
            let val = `${y}-${mm}`

            let opt = document.createElement("option")
            opt.value = val
            opt.text = val

            if(y===currentYear && m===currentMonth){
                opt.selected = true
            }

            select.appendChild(opt)
        }
    }
}

// ================= PTKP =================
function getPTKP(status){
    const map={
        "TK/0":54000000,
        "TK/1":58500000,
        "TK/2":63000000,
        "TK/3":67500000,
        "K/0":58500000,
        "K/1":63000000,
        "K/2":67500000,
        "K/3":72000000
    }
    return map[status]||54000000
}

// ================= TER LENGKAP =================
function getTER(bruto, status){

    status = status.trim()

    let kategori="C"
    if(["TK/0","TK/1","K/0"].includes(status)) kategori="A"
    else if(["TK/2","TK/3","K/1"].includes(status)) kategori="B"

    let tarif = 0

    // ================= KATEGORI A =================
    if(kategori=="A"){
        if(bruto >= 0 && bruto <= 5000000) tarif = 0
        else if(bruto > 5000000 && bruto <= 6000000) tarif = 0.0025
        else if(bruto > 6000000 && bruto <= 7000000) tarif = 0.005
        else if(bruto > 7000000 && bruto <= 8000000) tarif = 0.0075
        else if(bruto > 8000000 && bruto <= 9000000) tarif = 0.01
        else if(bruto > 9000000 && bruto <= 10000000) tarif = 0.015
        else if(bruto > 10000000 && bruto <= 15000000) tarif = 0.02
        else if(bruto > 15000000 && bruto <= 20000000) tarif = 0.025
        else if(bruto > 20000000 && bruto <= 30000000) tarif = 0.03
        else tarif = 0.035
    }

    // ================= KATEGORI B =================
    if(kategori=="B"){
        if(bruto >= 0 && bruto <= 5500000) tarif = 0
        else if(bruto > 5500000 && bruto <= 6500000) tarif = 0.0025
        else if(bruto > 6500000 && bruto <= 7500000) tarif = 0.005
        else if(bruto > 7500000 && bruto <= 8500000) tarif = 0.0075
        else if(bruto > 8500000 && bruto <= 9500000) tarif = 0.01
        else if(bruto > 9500000 && bruto <= 12000000) tarif = 0.015
        else if(bruto > 12000000 && bruto <= 17000000) tarif = 0.02
        else if(bruto > 17000000 && bruto <= 25000000) tarif = 0.025
        else if(bruto > 25000000 && bruto <= 30000000) tarif = 0.03
        else tarif = 0.035
    }

    // ================= KATEGORI C =================
    if(kategori=="C"){
        if(bruto >= 0 && bruto <= 6000000) tarif = 0
        else if(bruto > 6000000 && bruto <= 7000000) tarif = 0.0025
        else if(bruto > 7000000 && bruto <= 8000000) tarif = 0.005
        else if(bruto > 8000000 && bruto <= 9000000) tarif = 0.0075
        else if(bruto > 9000000 && bruto <= 11000000) tarif = 0.01
        else if(bruto > 11000000 && bruto <= 15000000) tarif = 0.015
        else if(bruto > 15000000 && bruto <= 20000000) tarif = 0.02
        else if(bruto > 20000000 && bruto <= 30000000) tarif = 0.025
        else tarif = 0.03
    }

    return bruto * tarif
}
// ================= PROGRESIF PASAL 17 =================
function progresif(pkp){

    if(pkp<=0) return 0

    let pajak=0

    if(pkp>500000000){
        pajak+=(pkp-500000000)*0.30
        pkp=500000000
    }
    if(pkp>250000000){
        pajak+=(pkp-250000000)*0.25
        pkp=250000000
    }
    if(pkp>50000000){
        pajak+=(pkp-50000000)*0.15
        pkp=50000000
    }

    pajak+=pkp*0.05

    return pajak
}

// ================= MAIN =================
async function generateTax(){

    let periode = document.getElementById("periode").value

    const {data:payroll}=await supabase.from('payroll').select('*').eq('periode',periode)
    const {data:master}=await supabase.from('master_payroll').select('*')

    hasil=[]

    for(let p of payroll){

        let m = master.find(x=>x.nik==p.nik)

        let status = (m?.status_pajak||"TK/0").trim()

        let gapok = p.gaji_pokok||0
        let tunjangan = p.tunjangan||0
        let premi = (p.jkk||0)+(p.jkm||0)+(p.bpjs4||0)
        let thr = p.irregular||0

        let bruto = gapok+tunjangan+premi+thr

        // ================= AKUMULASI =================
        let histori = payroll.filter(x=>x.nik==p.nik)

        let akum_bruto = histori.reduce((a,b)=>a+((b.gaji_pokok||0)+(b.tunjangan||0)+(b.jkk||0)+(b.jkm||0)+(b.bpjs4||0)+(b.irregular||0)),0)

        let bulan_ke = histori.length

        let max_biaya = Math.min(bulan_ke * 500000,6000000)

        let biaya = Math.min(akum_bruto * 0.05, max_biaya)

        let pensiun = histori.reduce((a,b)=>a+((b.jht||0)+(b.jp||0)),0)

        let neto = akum_bruto - biaya - pensiun

        let ptkp = getPTKP(status)

        let pkp = Math.max(neto - ptkp,0)

        let ter = getTER(bruto,status)

        let final = progresif(pkp)

        let selisih = final - ter

        let ket = selisih < 0 ? "Lebih Potong" : "Kurang Potong"

        hasil.push({
            nik:p.nik,
            nama:m?.nama||"",
            project:m?.project||"",
            gapok,tunjangan,premi,thr,
            bruto,akum_bruto,biaya,pensiun,
            neto,ptkp,pkp,ter,final,selisih,ket
        })
    }

    render()
}

// ================= RENDER =================
function render(){

    let tbody=document.querySelector("#tbl tbody")
    tbody.innerHTML=""

    hasil.forEach(x=>{
        tbody.innerHTML+=`
        <tr>
        <td>${x.nik}</td>
        <td>${x.nama}</td>
        <td>${x.project}</td>
        <td>${x.gapok}</td>
        <td>${x.tunjangan}</td>
        <td>${x.premi}</td>
        <td>${x.thr}</td>
        <td>${x.bruto}</td>
        <td>${x.akum_bruto}</td>
        <td>${x.biaya}</td>
        <td>${x.pensiun}</td>
        <td>${x.neto}</td>
        <td>${x.ptkp}</td>
        <td>${x.pkp}</td>
        <td>${x.ter}</td>
        <td>${x.final}</td>
        <td>${x.selisih}</td>
        <td>${x.ket}</td>
        </tr>`
    })
}

// ================= SAVE =================
async function saveData(){

    if(hasil.length==0){
        alert("Generate dulu")
        return
    }

    const {error}=await supabase.from('tax_engine').insert(hasil)

    if(error){
        console.log(error)
        alert("Gagal simpan")
    }else{
        alert("Berhasil simpan")
    }
}

    function setDefaultPeriode(){

    let month = (now.getMonth()+1).toString().padStart(2,'0')

    document.getElementById("periode").value = `${year}-${month}`
}

setDefaultPeriode()
