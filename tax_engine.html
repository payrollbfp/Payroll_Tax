<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tax Engine</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; padding:20px; }
button { padding:10px 15px; margin:5px; cursor:pointer; }
table { border-collapse: collapse; width:100%; margin-top:20px; }
th, td { border:1px solid #ccc; padding:8px; font-size:12px; }
th { background:#333; color:white; }
</style>
</head>

<body>

<h2>Tax Engine</h2>

<select id="periode"></select>
<button onclick="generateTax()">Generate Tax</button>
<button onclick="saveTax()">Save</button>

<table id="table">
<thead>
<tr>
<th>NIK</th><th>Nama</th><th>Project</th>
<th>Gapok</th><th>Tunjangan</th><th>Premi</th><th>Irregular</th>
<th>Bruto</th><th>Akumulasi Bruto</th><th>Biaya Jabatan</th>
<th>JHT</th><th>Neto</th><th>PTKP</th><th>PKP</th>
<th>PPH TER</th><th>PPH FINAL</th><th>Selisih</th><th>Keterangan</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

// ================= SUPABASE =================
const supabaseClient = supabase.createClient(
"https://nwrbjbwjmkahjuuyizfq.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53cmJqYndqbWthaGp1dXlpemZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjM4OTIsImV4cCI6MjA5MjQ5OTg5Mn0.n67pONlkoMqZguyoTwQQFJ0VBRfPaIVuVlPGxsajaGA"
);

let globalData = [];

// ================= NORMALIZE =================
function normalizeStatusPajak(status){
    return String(status||"").trim().toUpperCase()
    .replace(/\s+/g,'')
    .replace(/^TK0$/,'TK/0').replace(/^TK1$/,'TK/1')
    .replace(/^TK2$/,'TK/2').replace(/^TK3$/,'TK/3')
    .replace(/^K0$/,'K/0').replace(/^K1$/,'K/1')
    .replace(/^K2$/,'K/2').replace(/^K3$/,'K/3');
}

// ================= PTKP =================
const PTKP_MAP = {
"TK/0":54000000,"TK/1":58500000,"TK/2":63000000,"TK/3":67500000,
"K/0":58500000,"K/1":63000000,"K/2":67500000,"K/3":72000000
};

// ================= TER RANGE =================
const TER_TABLE = {
A:[
{min:0,max:5000000,rate:0},
{min:5000001,max:6000000,rate:0.0025},
{min:6000001,max:7000000,rate:0.005},
{min:7000001,max:8000000,rate:0.0075},
{min:8000001,max:9000000,rate:0.01},
{min:9000001,max:10000000,rate:0.015},
{min:10000001,max:15000000,rate:0.02},
{min:15000001,max:20000000,rate:0.025},
{min:20000001,max:30000000,rate:0.03},
{min:30000001,max:999999999,rate:0.035}
],
B:[
{min:0,max:6000000,rate:0},
{min:6000001,max:7000000,rate:0.0025},
{min:7000001,max:8000000,rate:0.005},
{min:8000001,max:9000000,rate:0.0075},
{min:9000001,max:11000000,rate:0.01},
{min:11000001,max:15000000,rate:0.015},
{min:15000001,max:20000000,rate:0.02},
{min:20000001,max:30000000,rate:0.025},
{min:30000001,max:999999999,rate:0.03}
],
C:[
{min:0,max:7000000,rate:0},
{min:7000001,max:8000000,rate:0.0025},
{min:8000001,max:9000000,rate:0.005},
{min:9000001,max:10000000,rate:0.0075},
{min:10000001,max:12000000,rate:0.01},
{min:12000001,max:15000000,rate:0.015},
{min:15000001,max:20000000,rate:0.02},
{min:20000001,max:30000000,rate:0.025},
{min:30000001,max:999999999,rate:0.03}
]
};

function getKategori(status){
if(["TK/0","TK/1","K/0"].includes(status)) return "A";
if(["TK/2","TK/3","K/1"].includes(status)) return "B";
return "C";
}

function getTER(bruto,status){
let kategori = getKategori(status);
let table = TER_TABLE[kategori];

for(let r of table){
if(bruto>=r.min && bruto<=r.max){
return bruto * r.rate;
}
}
return 0;
}
const BIAYA_JABATAN_TABLE = [
{min:1, max:1, limit:500000},
{min:2, max:2, limit:1000000},
{min:3, max:3, limit:1500000},
{min:4, max:4, limit:2000000},
{min:5, max:5, limit:2500000},
{min:6, max:6, limit:3000000},
{min:7, max:7, limit:3500000},
{min:8, max:8, limit:4000000},
{min:9, max:9, limit:4500000},
{min:10, max:10, limit:5000000},
{min:11, max:11, limit:5500000},
{min:12, max:12, limit:6000000}
];
// ================= BIAYA JABATAN RANGE =================
function biayaJabatan(akumBruto, bulanKe){

    let limit = 6000000; // default max tahunan

    for(let r of BIAYA_JABATAN_TABLE){
        if(bulanKe >= r.min && bulanKe <= r.max){
            limit = r.limit;
            break;
        }
    }

    return Math.min(akumBruto * 0.05, limit);
}
// ================= PROGRESIF =================
function pphProgresif(pkp){
if(pkp<=0) return 0;
if(pkp<=60000000) return pkp*0.05;
if(pkp<=250000000) return 60000000*0.05+(pkp-60000000)*0.15;
if(pkp<=500000000) return 60000000*0.05+190000000*0.15+(pkp-250000000)*0.25;
return 60000000*0.05+190000000*0.15+250000000*0.25+(pkp-500000000)*0.30;
}

// ================= LOAD PERIODE =================
async function loadPeriode(){
const { data=[] } = await supabaseClient.from("payroll").select("periode");
const unique=[...new Set(data.map(d=>d.periode))].sort().reverse();
const select=document.getElementById("periode");
select.innerHTML="";
unique.forEach(p=>{
let opt=document.createElement("option");
opt.value=p;
opt.textContent=p;
select.appendChild(opt);
});
}

// ================= GENERATE =================
async function generateTax(){

const periode=document.getElementById("periode").value;
if(!periode) return alert("Pilih periode!");

const { data: payrollData=[] } = await supabaseClient.from("payroll").select("*").eq("periode",periode);
const { data: masterData=[] } = await supabaseClient.from("master_payroll").select("*");

let hasil=[];

payrollData.forEach(r=>{

let m=masterData.find(x=>x.nik===r.nik)||{};

let gapok=Number(r.gaji_pokok||0);
let tunjangan=Number(r.tunjangan||0);
let premi=Number(r.jkk||0)+Number(r.jkm||0)+Number(r.bpjs4||0);
let irregular=Number(r.irregular||0);

let bruto=gapok+tunjangan+premi+irregular;

let jht=Number(r.jp1||0)+Number(r.jp2||0);
let bj=biayaJabatan(bruto);

let neto=bruto-bj-jht;

let status=normalizeStatusPajak(m.status_pajak);
let ptkp=PTKP_MAP[status]||54000000;

let pkp=neto-ptkp

let ter=getTER(bruto,status);
let final=pphProgresif(pkp);

let selisih=final-ter;
let ket=selisih<0?"Lebih Potong":"Kurang Potong";

hasil.push({
nik:r.nik,
nama:m.nama,
project:m.project,
gapok,tunjangan,premi,irregular,
bruto,
akumBruto:bruto,
bj,
akumJHT:jht,
neto,
ptkp,
pkp,
pphTER:ter,
pphFinal:final,
selisih,
ket,
periode
});

});

globalData=hasil;
renderTable(hasil);
}

// ================= RENDER =================
function renderTable(data){
const tbody=document.querySelector("#table tbody");
tbody.innerHTML="";
data.forEach(d=>{
tbody.innerHTML+=`
<tr>
<td>${d.nik}</td>
<td>${d.nama||""}</td>
<td>${d.project||""}</td>
<td>${d.gapok}</td>
<td>${d.tunjangan}</td>
<td>${d.premi}</td>
<td>${d.irregular}</td>
<td>${d.bruto}</td>
<td>${d.akumBruto}</td>
<td>${d.bj}</td>
<td>${d.akumJHT}</td>
<td>${d.neto}</td>
<td>${d.ptkp}</td>
<td>${d.pkp}</td>
<td>${d.pphTER}</td>
<td>${d.pphFinal}</td>
<td>${d.selisih}</td>
<td>${d.ket}</td>
</tr>`;
});
}

// ================= SAVE =================
async function saveTax(){
if(globalData.length===0) return alert("Generate dulu!");
const { error } = await supabaseClient.from("tax_engine").upsert(globalData);
if(error){ console.error(error); alert("Gagal save"); }
else alert("Berhasil save");
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded",loadPeriode);

</script>

</body>
</html>
