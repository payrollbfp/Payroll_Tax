const PTKP_MAP = {
  "TK/0":54000000,
  "TK/1":58500000,

  "K/0":58500000,

  "K/2":67500000,
  "K/3":72000000

function formatRp(val){
  return new Intl.NumberFormat('id-ID').format(Math.round(val||0));
}

function getProgressivePPh21Annual(pkp){
  let tax = 0;
  pkp = Math.floor(pkp / 1000) * 1000;

  if (pkp <= 0) return 0;
  if (pkp > 5000000000) { tax += (pkp - 5000000000) * 0.35; pkp = 5000000000; }
  if (pkp > 500000000) { tax += (pkp - 500000000) * 0.30; pkp = 500000000; }
  if (pkp > 250000000) { tax += (pkp - 250000000) * 0.25; pkp = 250000000; }
  if (pkp > 60000000) { tax += (pkp - 60000000) * 0.15; pkp = 60000000; }
  tax += pkp * 0.05;

  return Math.round(tax);
}

function normalizeStatus(status){
  return String(status || "TK/0")
    .trim()
    .toUpperCase()
    .replace(/\s+/g,'')
    .replace("TK0","TK/0")
    .replace("TK1","TK/1")
    .replace("TK2","TK/2")
    .replace("TK3","TK/3")
    .replace("K0","K/0")
    .replace("K1","K/1")
    .replace("K2","K/2")
    .replace("K3","K/3");
}

function getTERCategory(status){
  if(["TK/0","TK/1"].includes(status)) return "A";
  if(["TK/2","TK/3","K/0"].includes(status)) return "B";
  return "C";
}

async function generateTaxEngine(){
  const {data: payrollData,error: payrollError} = await supabaseClient
    .from('payroll')
    .select('*')
    .order('nik')
    .order('periode');

  if(payrollError) return alert(payrollError.message);

  const {data: masterData,error: masterError} = await supabaseClient
    .from('master_payroll')
    .select('nik,nama,project,status_pajak');

  if(masterError) return alert(masterError.message);

  const masterMap = {};
  masterData.forEach(x => masterMap[x.nik] = x);

  const grouped = {};
  payrollData.forEach(r=>{
    if(!grouped[r.nik]) grouped[r.nik] = [];
    grouped[r.nik].push(r);
  });

  const results = [];

  for(const nik in grouped){
    let akumulasiBruto = 0;
    let akumulasiIuran = 0;
    let totalTer = 0;

    const rows = grouped[nik];
    const master = masterMap[nik] || {};

    for(let i=0;i<rows.length;i++){
      const row = rows[i];

      const gapok = Number(row.gaji_pokok||0);
      const tunjangan = Number(row.tunjangan||0);
      const premi = Number(row.jkk||0)+Number(row.jkm||0)+Number(row.bpjs4||0);
      const irregular = Number(row.irregular||0);
      const iuran = Number(row.jht2||0)+Number(row.jp1||0);

      const brutoBulan = gapok+tunjangan+premi+irregular;

      akumulasiBruto += brutoBulan;
      akumulasiIuran += iuran;

      const biayaJabatan = Math.min(akumulasiBruto * 0.05, 6000000);
      const jumlahNeto = akumulasiBruto - biayaJabatan - akumulasiIuran;

      const statusPajak = normalizeStatus(master.status_pajak);
      const ptkp = PTKP_MAP[statusPajak] || 54000000;
      const pkp = Math.max(0, jumlahNeto - ptkp);

      const bulan = parseInt(row.periode.split('-')[1]);

      let pphTer = 0;
      let pphFinal = 0;

      if(bulan < 12){
        const terRate = getTERPercent(brutoBulan, statusPajak);
        pphTer = Math.round(brutoBulan * terRate);
        totalTer += pphTer;
      }else{
        const pajakSetahun = getProgressivePPh21Annual(pkp);
        pphFinal = Math.max(0, pajakSetahun - totalTer);
      }

      const selisihPajak = pphFinal - pphTer;

      let keterangan = "Nihil";
      if(selisihPajak > 0) keterangan = "Kurang Potong";
      if(selisihPajak < 0) keterangan = "Lebih Potong";

      results.push({
        periode: row.periode,
        nik,
        nama: master.nama || '',
        project: master.project || '',
        gapok,
        tunjangan,
        premi_asuransi: premi,
        irregular,
        bruto_bulan: brutoBulan,
        akumulasi_bruto: akumulasiBruto,
        akumulasi_biaya_jabatan: biayaJabatan,
        iuran_pensiun_jht: akumulasiIuran,
        jumlah_neto: jumlahNeto,
        ptkp,
        pkp,
        pph_ter: pphTer,
        pph_21_final: pphFinal,
        selisih_pajak: selisihPajak,
        keterangan
      });
    }
  }

  const {error: saveError} = await supabaseClient
    .from('tax_engine')
    .upsert(results,{onConflict:'nik,periode'});

  if(saveError) return alert(saveError.message);

  alert("Generate Tax berhasil");
  loadTaxEngine();
}

async function loadTaxEngine(){
  const {data,error} = await supabaseClient

    .select('*')
    .order('nik')
    .order('periode');

  if(error) return alert(error.message);

  const tbody = document.getElementById('taxTableBody');

  tbody.innerHTML = data.map(r=>`
    <tr>
      <td>${r.nik}</td>
      <td>${r.nama}</td>
      <td>${r.project}</td>
      <td>${formatRp(r.gapok)}</td>
      <td>${formatRp(r.tunjangan)}</td>
      <td>${formatRp(r.premi_asuransi)}</td>
      <td>${formatRp(r.irregular)}</td>
      <td>${formatRp(r.bruto_bulan)}</td>
      <td>${formatRp(r.akumulasi_bruto)}</td>
      <td>${formatRp(r.akumulasi_biaya_jabatan)}</td>
      <td>${formatRp(r.iuran_pensiun_jht)}</td>
      <td>${formatRp(r.jumlah_neto)}</td>
      <td>${formatRp(r.ptkp)}</td>
      <td>${formatRp(r.pkp)}</td>
      <td>${formatRp(r.pph_ter)}</td>
      <td>${formatRp(r.pph_21_final)}</td>
      <td>${formatRp(r.selisih_pajak)}</td>
      <td>${r.keterangan}</td>
    </tr>
  `).join('');
}

function saveTaxEngine(){
  alert("Data sudah otomatis tersimpan saat Generate Tax");
}

window.onload = loadTaxEngine;
</script>
