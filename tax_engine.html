<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Tax Engine</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{font-family:Segoe UI;margin:0;background:#eef2f7;}
.header{
    background:#1e293b;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}
.header-right{display:flex;gap:10px;}
.container{padding:20px;}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 6px 15px rgba(0,0,0,0.08);}
button{padding:8px 14px;border:none;border-radius:6px;background:#3b82f6;color:white;cursor:pointer;}
select{padding:8px;border-radius:6px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{border:1px solid #ddd;padding:6px;text-align:left;}
th{background:#334155;color:white;}
</style>
</head>

<body>

<div class="header">
    <h2>Tax Engine</h2>
    <div class="header-right">
        <select id="periodeSelect"></select>
        <button onclick="loadTax()">Generate</button>
        <button onclick="saveTax()">Save</button>
        <button onclick="goBack()">Back</button>
    </div>
</div>

<div class="container">
<div class="card">
<table>
<thead>
<tr>
<th>NIK</th>
<th>Nama</th>
<th>Project</th>
<th>Gapok</th>
<th>Tunjangan</th>
<th>Premi Asuransi</th>
<th>Irregular Income</th>
<th>Jumlah Bruto</th>
<th>Biaya Jabatan</th>
<th>Iuran</th>
<th>Neto</th>
<th>PTKP</th>
<th>PKP</th>
<th>PPH TER</th>
<th>PPH 21 FINAL</th>
<th>Selisih</th>
<th>Keterangan</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

<script>
const SUPABASE_URL = "https://nwrbjbwjmkahjuuyizfq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53cmJqYndqbWthaGp1dXlpemZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjM4OTIsImV4cCI6MjA5MjQ5OTg5Mn0.n67pONlkoMqZguyoTwQQFJ0VBRfPaIVuVlPGxsajaGA";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentData = [];

const PTKP = {
"TK/0":54000000,"TK/1":58500000,"TK/2":63000000,"TK/3":67500000,
"K/0":58500000,"K/1":63000000,"K/2":67500000,"K/3":72000000
};

// LOAD PERIODE
async function loadPeriode(){
    const { data } = await supabaseClient.from("payroll").select("periode");
    const unique = [...new Set(data.map(d=>d.periode))].sort();
    const select = document.getElementById("periodeSelect");
    select.innerHTML = "";
    unique.forEach(p=>{
        select.innerHTML += `<option value="${p}">${p}</option>`;
    });
}

// TER
function getKategoriPTKP(status){
if(["TK/0","TK/1","K/0","K/1"].includes(status)) return "A";
if(["TK/2","TK/3","K/2"].includes(status)) return "B";
return "C";
}

function getTarifTER(bruto,status){
const k = getKategoriPTKP(status);

if(k==="A"){
if(bruto<=5400000)return 0;
if(bruto<=5650000)return 0.0025;
if(bruto<=5950000)return 0.005;
if(bruto<=6300000)return 0.0075;
if(bruto<=6750000)return 0.01;
if(bruto<=7500000)return 0.0125;
if(bruto<=8550000)return 0.015;
if(bruto<=9650000)return 0.0175;
if(bruto<=10350000)return 0.02;
if(bruto<=10700000)return 0.025;
if(bruto<=11050000)return 0.03;
return 0.05;
}

if(k==="B"){
if(bruto<=6200000)return 0;
if(bruto<=6500000)return 0.0025;
if(bruto<=6850000)return 0.005;
if(bruto<=7300000)return 0.0075;
if(bruto<=9200000)return 0.01;
if(bruto<=10750000)return 0.015;
if(bruto<=11250000)return 0.02;
return 0.05;
}

if(bruto<=6600000)return 0;
if(bruto<=6950000)return 0.0025;
if(bruto<=7350000)return 0.005;
if(bruto<=7800000)return 0.0075;
if(bruto<=8850000)return 0.01;
if(bruto<=9800000)return 0.0125;
if(bruto<=10950000)return 0.015;
return 0.05;
}

// PROGRESIF
function tarifProgresif(pkp){
let pajak=0;
if(pkp>500000000){pajak+=(pkp-500000000)*0.30; pkp=500000000;}
if(pkp>250000000){pajak+=(pkp-250000000)*0.25; pkp=250000000;}
if(pkp>60000000){pajak+=(pkp-60000000)*0.15; pkp=60000000;}
if(pkp>0){pajak+=pkp*0.05;}
return pajak;
}

// MAIN
async function loadTax(){

const selected = document.getElementById("periodeSelect").value;

const { data: payroll } = await supabaseClient
.from("payroll")
.select("*")
.lte("periode", selected);

const { data: master } = await supabaseClient
.from("master_payroll")
.select("*");

let masterMap = {};
master.forEach(m=>{
masterMap[(m.nik||"").trim()] = m;
});

let group = {};
payroll.forEach(r=>{
let nik = (r.nik||"").trim();
if(!group[nik]) group[nik]=[];
group[nik].push(r);
});

currentData = [];
let html="";

Object.keys(group).forEach(nik=>{

const rows = group[nik];
const m = masterMap[nik] || {};

const nama = m.nama || "-";
const project = m.project || "-";
const status = (m.status_pajak || "TK/0").trim();

let totalBruto=0,totalIuran=0,totalTER=0;

let last = rows[rows.length-1]; // ambil periode terakhir utk display

rows.forEach(r=>{
let gapok = +r.gaji_pokok||0;
let tunj = +r.tunjangan||0;
let premi = (+r.jkk||0)+(+r.jkm||0)+(+r.bpjs4||0);
let irregular = +r.irregular||0;
let iuran = (+r.jht2||0)+(+r.jp1||0);

let bruto = gapok+tunj+premi+irregular;

totalBruto += bruto;
totalIuran += iuran;
totalTER += bruto * getTarifTER(bruto,status);
});

let biayaJabatan = 500000 * rows.length;
let neto = totalBruto - biayaJabatan - totalIuran;
let ptkp = PTKP[status] || 54000000;
let pkp = Math.max(0, neto - ptkp);
let pphFinal = tarifProgresif(pkp);

let selisih = pphFinal - totalTER;
let ket = selisih > 0 ? "Kurang Potong" : "Lebih Potong";

html += `<tr>
<td>${nik}</td>
<td>${nama}</td>
<td>${project}</td>
<td>${(+last.gaji_pokok||0).toFixed(0)}</td>
<td>${(+last.tunjangan||0).toFixed(0)}</td>
<td>${((+last.jkk||0)+(+last.jkm||0)+(+last.bpjs4||0)).toFixed(0)}</td>
<td>${(+last.irregular||0).toFixed(0)}</td>
<td>${totalBruto.toFixed(0)}</td>
<td>${biayaJabatan.toFixed(0)}</td>
<td>${totalIuran.toFixed(0)}</td>
<td>${neto.toFixed(0)}</td>
<td>${ptkp.toFixed(0)}</td>
<td>${pkp.toFixed(0)}</td>
<td>${totalTER.toFixed(0)}</td>
<td>${pphFinal.toFixed(0)}</td>
<td>${selisih.toFixed(0)}</td>
<td>${ket}</td>
</tr>`;
});

document.getElementById("tbody").innerHTML = html;
}

// SAVE
async function saveTax(){
if(currentData.length===0) return alert("Generate dulu");
await supabaseClient.from("tax_report").insert(currentData);
alert("Saved");
}

// BACK
function goBack(){
window.location.href="dashboard.html";
}

loadPeriode();
</script>

</body>
</html>
