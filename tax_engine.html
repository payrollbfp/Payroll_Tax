function normalizeStatusPajak(status){
    return String(status || '')
        .trim()
        .toUpperCase()
        .replace(/\s+/g,'')
        .replace(/^TK0$/,'TK/0')
        .replace(/^TK1$/,'TK/1')
        .replace(/^TK2$/,'TK/2')
        .replace(/^TK3$/,'TK/3')
        .replace(/^K0$/,'K/0')
        .replace(/^K1$/,'K/1')
        .replace(/^K2$/,'K/2')
        .replace(/^K3$/,'K/3');
}

const PTKP_MAP = {
"TK/0":54000000,"TK/1":58500000,"TK/2":63000000,"TK/3":67500000,
"K/0":58500000,"K/1":63000000,"K/2":67500000,"K/3":72000000
};

function getTER(bruto, status){

    status = (status||"").trim()

    let kategori = "C"
    if(["TK/0","TK/1","K/0"].includes(status)) kategori="A"
    else if(["TK/2","TK/3","K/1"].includes(status)) kategori="B"

    let tarif = 0

    // ================= KATEGORI A =================
    if(kategori==="A"){
        if(bruto >= 0 && bruto <= 5000000) tarif = 0
        else if(bruto >= 5000001 && bruto <= 6000000) tarif = 0.0025
        else if(bruto >= 6000001 && bruto <= 7000000) tarif = 0.005
        else if(bruto >= 7000001 && bruto <= 8000000) tarif = 0.0075
        else if(bruto >= 8000001 && bruto <= 9000000) tarif = 0.01
        else if(bruto >= 9000001 && bruto <= 10000000) tarif = 0.015
        else if(bruto >= 10000001 && bruto <= 15000000) tarif = 0.02
        else if(bruto >= 15000001 && bruto <= 20000000) tarif = 0.025
        else if(bruto >= 20000001 && bruto <= 30000000) tarif = 0.03
        else tarif = 0.035
    }

    // ================= KATEGORI B =================
    if(kategori==="B"){
        if(bruto >= 0 && bruto <= 6000000) tarif = 0
        else if(bruto >= 6000001 && bruto <= 7000000) tarif = 0.0025
        else if(bruto >= 7000001 && bruto <= 8000000) tarif = 0.005
        else if(bruto >= 8000001 && bruto <= 9000000) tarif = 0.0075
        else if(bruto >= 9000001 && bruto <= 11000000) tarif = 0.01
        else if(bruto >= 11000001 && bruto <= 15000000) tarif = 0.015
        else if(bruto >= 15000001 && bruto <= 20000000) tarif = 0.02
        else if(bruto >= 20000001 && bruto <= 30000000) tarif = 0.025
        else tarif = 0.03
    }

    // ================= KATEGORI C =================
    if(kategori==="C"){
        if(bruto >= 0 && bruto <= 7000000) tarif = 0
        else if(bruto >= 7000001 && bruto <= 8000000) tarif = 0.0025
        else if(bruto >= 8000001 && bruto <= 9000000) tarif = 0.005
        else if(bruto >= 9000001 && bruto <= 10000000) tarif = 0.0075
        else if(bruto >= 10000001 && bruto <= 12000000) tarif = 0.01
        else if(bruto >= 12000001 && bruto <= 15000000) tarif = 0.015
        else if(bruto >= 15000001 && bruto <= 20000000) tarif = 0.02
        else if(bruto >= 20000001 && bruto <= 30000000) tarif = 0.025
        else tarif = 0.03
    }

    return bruto * tarif
}

function getKategori(status){
    if(["TK/0","TK/1","K/0"].includes(status)) return "A";
    if(["TK/2","TK/3","K/1"].includes(status)) return "B";
    return "C";
}

function getTarifTER(bruto,kategori){
    for(let r of TER_TABLE[kategori]){
        if(bruto>=r.min && bruto<=r.max){
            return r.rate;
        }
    }
    return 0;
}

function biayaJabatan(akum,bulan){
    return Math.min(akum*0.05,bulan*500000);
}

function pphProgresif(pkp){

    if(pkp<=0) return 0;

    if(pkp<=60000000) return pkp*0.05;

    if(pkp<=250000000){
        return 60000000*0.05+(pkp-60000000)*0.15;
    }

    if(pkp<=500000000){
        return 60000000*0.05+190000000*0.15+(pkp-250000000)*0.25;
    }

    return 60000000*0.05+190000000*0.15+250000000*0.25+(pkp-500000000)*0.30;
}

let globalData = [];

async function generateTax(){
console.log("Periode:", periode);
console.log("Payroll:", payroll);
console.log("Master:", master);
    console.log("Generate jalan");

    const periode = document.getElementById("periode").value;

    const { data: payroll } = await supabaseClient
        .from("payroll")
        .select("*")
        .eq("periode", periode);

    const { data: master } = await supabaseClient
        .from("master_payroll")
        .select("*");

    let group = {};

    payroll.forEach(r=>{
        if(!group[r.nik]) group[r.nik] = [];
        group[r.nik].push(r);
    });
const { data: payroll = [] } = await supabaseClient
    .from("payroll")
    .select("*")
    .eq("periode", periode);

const { data: master = [] } = await supabaseClient
    .from("master_payroll")
    .select("*");
    let hasil = [];

    Object.keys(group).forEach(nik=>{

        let rows = group[nik].sort((a,b)=>a.periode.localeCompare(b.periode));

        let akumBruto=0, akumJHT=0, akumTER=0, bulan=0;

        rows.forEach(r=>{

            bulan++;

            let m = master.find(x=>x.nik===nik) || {};

            let gapok = Number(r.gaji_pokok||0);
            let tunjangan = Number(r.tunjangan||0);
            let premi = Number(r.jkk||0)+Number(r.jkm||0)+Number(r.bpjs4||0);
            let thr = Number(r.irregular||0);

            let bruto = gapok+tunjangan+premi+thr;

            akumBruto += bruto;

            let bj = biayaJabatan(akumBruto,bulan);

            let jht = Number(r.jp1||0)+Number(r.jp2||0);
            akumJHT += jht;

            let neto = akumBruto - bj - akumJHT;

            let status = normalizeStatusPajak(m.status_pajak);
            let ptkp = PTKP_MAP[status] || 54000000;

            let pkpTahunan = Math.max(0, neto - ptkp);
            let pkpBulanan = pkpTahunan / 12;

           let ter = getTER(bruto, status);

            if(r.periode.endsWith("-12")){
                ter = 0;
            } else {
                akumTER += ter;
            }

            let final = pphProgresif(pkpBulanan);

            let selisih = final - akumTER;

            let ket = selisih < 0 ? "Lebih Potong" : "Kurang Potong";

            hasil.push({
                nik:nik,
                nama:m.nama,
                project:m.project,
                gapok:gapok,
                tunjangan:tunjangan,
                premi:premi,
                thr:thr,
                bruto:bruto,
                akumBruto:akumBruto,
                bj:bj,
                akumJHT:akumJHT,
                neto:neto,
                ptkp:ptkp,
                pkp:pkpBulanan,
                pphTER:ter,
                pphFinal:final,
                selisih:selisih,
                ket:ket
            });

        });

    });

    globalData = hasil;
    renderTable(hasil);
}

function renderTable(data){

    const tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    data.forEach(d=>{

            <td>${d.bruto}</td>
            <td>${d.akumBruto}</td>
            <td>${d.bj}</td>
            <td>${d.akumJHT}</td>
            <td>${d.neto}</td>
            <td>${d.ptkp}</td>
            <td>${d.pkp}</td>
            <td>${d.pphTER}</td>
            <td>${d.pphFinal}</td>
            <td>${d.selisih}</td>
            <td>${d.ket}</td>
        </tr>
        `;
        tbody.innerHTML += row;
    });
}

async function saveTax(){

    if(globalData.length === 0){
        alert("Generate dulu!");
        return;
    }

    const { error } = await supabaseClient
        .from("tax_engine")
        .upsert(globalData);

    if(error){
        console.error(error);
        alert("Gagal save");
    }else{

}
