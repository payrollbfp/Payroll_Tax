// ================= NORMALIZE =================
function normalizeStatusPajak(status){
    return String(status||"").trim().toUpperCase()
    .replace(/\s+/g,'')
    .replace(/^TK0$/,'TK/0').replace(/^TK1$/,'TK/1')
    .replace(/^TK2$/,'TK/2').replace(/^TK3$/,'TK/3')
    .replace(/^K0$/,'K/0').replace(/^K1$/,'K/1')
    .replace(/^K2$/,'K/2').replace(/^K3$/,'K/3');
}

function biayaJabatan(akumBruto, bulanKe){
let limit = 6000000;
for(let r of BIAYA_JABATAN_TABLE){
if(bulanKe>=r.min && bulanKe<=r.max){
limit = r.limit;
break;
}
}
return Math.min(akumBruto * 0.05, limit);
}

// ================= PROGRESIF =================
function pphProgresif(pkp){
if(pkp<=0) return 0;
if(pkp<=60000000) return pkp*0.05;
if(pkp<=250000000) return 60000000*0.05+(pkp-60000000)*0.15;
if(pkp<=500000000) return 60000000*0.05+190000000*0.15+(pkp-250000000)*0.25;
return 60000000*0.05+190000000*0.15+250000000*0.25+(pkp-500000000)*0.30;
}

// ================= LOAD FILTER =================
function loadFilter(){

const bulanList=["01","02","03","04","05","06","07","08","09","10","11","12"];
const bulanEl=document.getElementById("bulan");
bulanList.forEach(b=>{
let opt=document.createElement("option");
opt.value=b;
opt.textContent=b;
bulanEl.appendChild(opt);
});

supabaseClient.from("payroll").select("periode").then(({data=[]})=>{
const tahunSet=new Set(data.map(d=>d.periode.split("-")[0]));
const tahunEl=document.getElementById("tahun");
[...tahunSet].sort().reverse().forEach(t=>{
let opt=document.createElement("option");
opt.value=t;
opt.textContent=t;
tahunEl.appendChild(opt);
});
});

}

// ================= GENERATE =================
async function generateTax(){

const bulan=document.getElementById("bulan").value;
const tahun=document.getElementById("tahun").value;

if(!bulan || !tahun) return alert("Pilih bulan & tahun!");

const periode=`${tahun}-${bulan}`;

const { data: payrollData=[] } = await supabaseClient
.from("payroll")
.select("*")
.lte("periode", periode)
.order("periode",{ascending:true});

const { data: masterData=[] } = await supabaseClient
.from("master_payroll")
.select("*");

let group={};
payrollData.forEach(r=>{
if(!group[r.nik]) group[r.nik]=[];
group[r.nik].push(r);
});

let hasil=[];

Object.keys(group).forEach(nik=>{

let rows=group[nik].sort((a,b)=>a.periode.localeCompare(b.periode));

let akumBruto=0, akumJHT=0, bulanKe=0;

rows.forEach(r=>{

bulanKe++;

let m=masterData.find(x=>x.nik===nik)||{};

let gapok=Number(r.gaji_pokok||0);
let tunjangan=Number(r.tunjangan||0);
let premi=Number(r.jkk||0)+Number(r.jkm||0)+Number(r.bpjs4||0);
let irregular=Number(r.irregular||0);

let bruto=gapok+tunjangan+premi+irregular;

akumBruto+=bruto;

let jht=Number(r.jp1||0)+Number(r.jp2||0);
akumJHT+=jht;

let bj=biayaJabatan(akumBruto,bulanKe);

let neto=akumBruto-bj-akumJHT;

let status=normalizeStatusPajak(m.status_pajak);
let ptkp=PTKP_MAP[status]||54000000;

let pkp=neto-ptkp

let ter=getTER(bruto,status);
let final=pphProgresif(pkp);

let selisih=final-ter;
let ket=selisih<0?"Lebih Potong":"Kurang Potong";

if(r.periode===periode){

if(!hasil.some(x=>x.nik===nik && x.periode===periode)){
hasil.push({
nik,
nama:m.nama,
project:m.project,
gapok,tunjangan,premi,irregular,
bruto,
akumBruto,
bj,
akumJHT,
neto,
ptkp,
pkp,
pphTER:ter,
pphFinal:final,
selisih,
ket,
periode
});
}

}

});

});

globalData=hasil;
renderTable(hasil);

}

// ================= SAVE =================
async function saveTax(){
