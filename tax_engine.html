<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tax Engine</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  font-family:Arial,sans-serif;
  background:#eef2f7;
  margin:0;
}
.topbar{
  background:#1e293b;
  color:white;
  padding:16px 24px;
}
.wrapper{
  padding:20px;
}
.container{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}
.header{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}
button,input{
  padding:10px 14px;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  cursor:pointer;
  font-weight:bold;
}
.generate{background:#3b82f6;color:white;border:none;}
.save{background:#22c55e;color:white;border:none;}
.back{background:#94a3b8;color:white;border:none;}
.table-wrap{
  overflow:auto;
  max-height:75vh;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}
th,td{
  border:1px solid #e5e7eb;
  padding:8px;
  text-align:right;
}
th{
  background:#334155;
  color:white;
}
td:nth-child(1),td:nth-child(2),td:nth-child(3){
  text-align:left;
}
</style>
</head>
<body>

<div class="topbar">
  <h2>Tax Engine</h2>
</div>

<div class="wrapper">
<div class="container">

<div class="header">
  <input type="month" id="periodeInput">
  <button class="generate" onclick="generateTax()">Generate Tax</button>
  <button class="save" onclick="saveTax()">Save</button>
  <button class="back" onclick="history.back()">Back</button>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>NIK</th><th>Nama</th><th>Project</th>
<th>Gapok</th><th>Tunjangan</th><th>Premi Asuransi</th><th>THR</th>
<th>Penghasilan Bruto Bulan</th><th>Akumulasi Penghasilan Bruto</th>
<th>Akumulasi Biaya Jabatan</th><th>Iuran Pensiun/JHT</th>
<th>Jumlah Neto</th><th>PTKP</th><th>PKP</th>
<th>PPH TER</th><th>PPH 21 FINAL</th><th>Selisih Pajak</th><th>Keterangan</th>
</tr>
</thead>
<tbody id="taxBody"></tbody>
</table>
</div>

</div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://nwrbjbwjmkahjuuyizfq.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53cmJqYndqbWthaGp1dXlpemZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjM4OTIsImV4cCI6MjA5MjQ5OTg5Mn0.n67pONlkoMqZguyoTwQQFJ0VBRfPaIVuVlPGxsajaGA"
);

const PTKP = {
 "TK/0":54000000,"TK/1":58500000,"TK/2":63000000,"TK/3":67500000,
 "K/0":58500000,"K/1":63000000,"K/2":67500000,"K/3":72000000
};

function formatRp(v){
 return new Intl.NumberFormat('id-ID').format(Math.round(v||0));
}

function normalizeStatusPajak(status){
 return String(status||'').trim().toUpperCase();
}

function getBiayaJabatanMax(bulanKe){
 return Math.min(bulanKe*500000,6000000);
}

function progressiveTax(pkp){
 let tax=0;
 if(pkp>500000000){tax+=(pkp-500000000)*0.30;pkp=500000000;}
 if(pkp>250000000){tax+=(pkp-250000000)*0.25;pkp=250000000;}
 if(pkp>60000000){tax+=(pkp-60000000)*0.15;pkp=60000000;}
 tax+=pkp*0.05;
 return Math.round(tax);
}

async function generateTax(){
 const periode=document.getElementById('periodeInput').value;
 if(!periode) return alert("Pilih periode dahulu");

 const {data:payroll,error:e1}=await supabaseClient
   .from('payroll')
   .select('*')
   .lte('periode',periode)
   .order('nik')
   .order('periode');

 if(e1) return alert("Payroll error: "+e1.message);

 alert("Jumlah payroll ditemukan: "+payroll.length);

 const {data:master,error:e2}=await supabaseClient
   .from('master_payroll')
   .select('*');

 if(e2) return alert("Master error: "+e2.message);

 const masterMap={};
 master.forEach(m=>masterMap[m.nik]=m);

 const grouped={};
 payroll.forEach(r=>{
   if(!grouped[r.nik]) grouped[r.nik]=[];
   grouped[r.nik].push(r);
 });

 const results=[];

 for(const nik in grouped){
   let brutoAk=0,iuranAk=0,terAk=0;
   const rows=grouped[nik];
   const mp=masterMap[nik]||{};
   const ptkp=PTKP[normalizeStatusPajak(mp.status_pajak)]||54000000;

   for(let i=0;i<rows.length;i++){
     const r=rows[i];

     const gapok=Number(r.gaji_pokok||0);
     const tunjangan=Number(r.tunjangan||0);
     const premi=Number(r.jkk||0)+Number(r.jkm||0)+Number(r.bpjs4||0);
     const thr=Number(r.irregular||0);
     const bruto=gapok+tunjangan+premi+thr;
     const iuran=Number(r.jht2||0)+Number(r.jp1||0);

     brutoAk += bruto;
     iuranAk += iuran;

     const biayaJabatan=Math.min(brutoAk*0.05,getBiayaJabatanMax(i+1));
     const neto=brutoAk-biayaJabatan-iuranAk;
     const pkp=Math.max(0,Math.floor((neto-ptkp)/1000)*1000);

     const pphTer=0;
     terAk += pphTer;

     const pphFinal=progressiveTax(pkp);
     const selisih=pphFinal-terAk;
     const ket=selisih<0?'Lebih Potong':selisih>0?'Kurang Potong':'Nihil';

     if(r.periode===periode){
       results.push({
         periode:r.periode,
         nik,
         nama:mp.nama||'',
         project:mp.project||'',
         gapok,
         tunjangan,
         premi_asuransi:premi,
         irregular:thr,
         bruto_bulan:bruto,
         akumulasi_bruto:brutoAk,
         akumulasi_biaya_jabatan:biayaJabatan,
         iuran_pensiun_jht:iuranAk,
         jumlah_neto:neto,
         ptkp,
         pkp,
         pph_ter:pphTer,
         pph_21_final:pphFinal,
         selisih_pajak:selisih,
         keterangan:ket
       });
     }
   }
 }

 alert("Jumlah hasil generate: "+results.length);

 const {error:e3}=await supabaseClient
   .from('tax_engine')
   .upsert(results,{onConflict:'nik,periode'});

 if(e3) return alert("Save error: "+e3.message);

 alert("Generate Tax berhasil");
 loadTax();
}

async function loadTax(){
 const periode=document.getElementById('periodeInput').value;
 if(!periode) return;

 const {data,error}=await supabaseClient
   .from('tax_engine')
   .select('*')
   .eq('periode',periode)
   .order('nik');

 if(error) return alert(error.message);

 const tbody=document.getElementById('taxBody');

 tbody.innerHTML=data.map(r=>`
 <tr>
 <td>${r.nik}</td>
 <td>${r.nama}</td>
 <td>${r.project}</td>
 <td>${formatRp(r.gapok)}</td>
 <td>${formatRp(r.tunjangan)}</td>
 <td>${formatRp(r.premi_asuransi)}</td>
 <td>${formatRp(r.irregular)}</td>
 <td>${formatRp(r.bruto_bulan)}</td>
 <td>${formatRp(r.akumulasi_bruto)}</td>
 <td>${formatRp(r.akumulasi_biaya_jabatan)}</td>
 <td>${formatRp(r.iuran_pensiun_jht)}</td>
 <td>${formatRp(r.jumlah_neto)}</td>
 <td>${formatRp(r.ptkp)}</td>
 <td>${formatRp(r.pkp)}</td>
 <td>${formatRp(r.pph_ter)}</td>
 <td>${formatRp(r.pph_21_final)}</td>
 <td>${formatRp(r.selisih_pajak)}</td>
 <td>${r.keterangan}</td>
 </tr>
 `).join('');
}

function saveTax(){
 alert("Data tersimpan otomatis saat Generate Tax");
}
</script>

</body>
</html>
