</tr>

<script>

// ================= HELPER =================
function goBack(){
    window.location.href = "index.html"; // arahkan ke dashboard kamu
}

function getTERCategory(status){
  if(["TK/0","TK/1","K/0"].includes(status)) return "A";
  if(["TK/2","TK/3","K/1"].includes(status)) return "B";
  return "C";
}


function normalizeStatus(s){
    return (s||"TK/0").toUpperCase().replace(/\s/g,'');
}

// ================= PTKP =================
const PTKP_MAP={
"TK/0":54000000,"TK/1":58500000,"TK/2":63000000,"TK/3":67500000,
"K/0":58500000,"K/1":63000000,"K/2":67500000,"K/3":72000000
};

// ================= TER =================
const TER_TABLE={
A:[[0,5400000,0],[5400001,5650000,0.0025],[5650001,5950000,0.005],[5950001,6300000,0.0075],[6300001,6750000,0.01],[6750001,7500000,0.0125],[7500001,8550000,0.015],[8550001,9650000,0.0175],[9650001,10050000,0.02],[10050001,10350000,0.0225],[10350001,10700000,0.025],[10700001,11050000,0.03],[11050001,11600000,0.035],[11600001,12500000,0.04],[12500001,13750000,0.05],[13750001,15100000,0.06],[15100001,16950000,0.07],[16950001,19750000,0.08],[19750001,24150000,0.09],[24150001,26450000,0.10],[26450001,28000000,0.11],[28000001,30000000,0.12],[30000001,Infinity,0.13]],
    B:[[0,6200000,0],[6200001,6500000,0.0025],[6500001,6850000,0.005],[6850001,7300000,0.0075],[7300001,9200000,0.01],[9200001,10750000,0.015],[10750001,11250000,0.02],[11250001,11600000,0.025],[11600001,12600000,0.03],[12600001,13600000,0.04],[13600001,14950000,0.05],[14950001,16400000,0.06],[16400001,18450000,0.07],[18450001,21850000,0.08],[21850001,26000000,0.09],[26000001,27700000,0.10],[27700001,29350000,0.11],[29350001,30000000,0.12],[30000001,Infinity,0.13]],
    C:[
 [0,6600000,0],
 [6600001,6950000,0.0025],
 [6950001,7350000,0.005],
 [7350001,7800000,0.0075],
 [7800001,8850000,0.01],
 [8850001,9800000,0.0125],
 [9800001,10950000,0.015],
 [10950001,11200000,0.0175],
 [11200001,12050000,0.02],
 [12050001,12950000,0.03],
 [12950001,14150000,0.04], // 🔥 FIX
 [14150001,15550000,0.05], // 🔥 FIX
 [15550001,17050000,0.06],
 [17050001,19500000,0.07],
 [19500001,22700000,0.08],
 [22700001,26600000,0.09],
 [26600001,28100000,0.10],
 [28100001,30000000,0.11],
 [30000001,Infinity,0.12]
]
  };


function getTER(bruto,status){
    let kategori=getTERCategory(status);
    let table=TER_TABLE[kategori];

    for(let r of table){
        if(bruto>=r[0] && bruto<=r[1]){
            return bruto*r[2];
        }
    }
    return 0;
}

// ================= BIAYA JABATAN =================
const BIAYA_JABATAN_TABLE = [
{min:1, max:1, limit:500000},
{min:2, max:2, limit:1000000},
{min:3, max:3, limit:1500000},
{min:4, max:4, limit:2000000},
{min:5, max:5, limit:2500000},
{min:6, max:6, limit:3000000},
{min:7, max:7, limit:3500000},
{min:8, max:8, limit:4000000},
{min:9, max:9, limit:4500000},
{min:10, max:10, limit:5000000},
{min:11, max:11, limit:5500000},
{min:12, max:12, limit:6000000}
];
 
    
function biayaJabatan(akumBruto, bulanKe){
let limit = 6000000;
for(let r of BIAYA_JABATAN_TABLE){
if(bulanKe>=r.min && bulanKe<=r.max){
limit = r.limit;
break;
}
}
return Math.min(akumBruto * 0.05, limit);
}


// ================= PROGRESIF =================
function pphProgresif(pkp){
if(pkp<=0) return 0;
if(pkp<=60000000) return pkp*0.05;
if(pkp<=250000000) return 60000000*0.05+(pkp-60000000)*0.15;
return 0;
}

// ================= LOAD FILTER =================
function loadFilter(){
for(let i=1;i<=12;i++){
let b=i.toString().padStart(2,"0");
bulan.innerHTML+=`<option value="${b}">${b}</option>`;
}

for(let y=2023;y<=2030;y++){
tahun.innerHTML+=`<option>${y}</option>`;
}
}

// ================= GENERATE =================
async function generateTax(){

let {data:payroll=[]}=await supabaseClient.from("payroll").eq("periode", periode);
let {data:master=[]}=await supabaseClient.from("master_payroll").eq("periode", periode);

let hasil=[];

payroll.forEach(r=>{

let m=master.find(x=>x.nik===r.nik)||{};

let gapok=Number(r.gaji_pokok||0);
let tunjangan=Number(r.tunjangan||0);
let premi=Number(r.jkk||0)+Number(r.jkm||0)+Number(r.bpjs4||0);
let irregular=Number(r.irregular||0);

let bruto=gapok+tunjangan+premi+irregular;
let jht=Number(r.jp1||0)+Number(r.jp2||0);
let akum=bruto;

let bj=biayaJabatan(akum);
let neto=akum-bj-jht;

let status=normalizeStatus(m.status_pajak);
let ptkp=PTKP_MAP[status]||54000000;

let pkp=neto-ptkp;

let ter=getTER(bruto,status);
let final=pphProgresif(pkp);

hasil.push({
periode: row.periode
nik:r.nik,
nama:m.nama,
project:m.project,
gapok,tunjangan,premi,irregular,
bruto,
akumBruto:bruto,
bj,
akumJHT:jht,
neto,
ptkp,
pkp,
pphTER:ter,
pphFinal:final,
selisih:final-ter,
ket:(final-ter)>0?"Kurang":"Lebih"
});

});

localStorage.setItem("taxData",JSON.stringify(hasil));
render(hasil);

}

// ================= RENDER =================
function render(data){
let tbody=document.querySelector("tbody");
tbody.innerHTML="";
data.forEach(d=>{
tbody.innerHTML+=`
<tr>
<td>${d.nik}</td>
<td>${d.nama||""}</td>
<td>${d.project||""}</td>
<td>${d.gapok}</td>
<td>${d.tunjangan}</td>
<td>${d.premi}</td>
<td>${d.irregular}</td>
<td>${d.bruto}</td>
<td>${d.akumBruto}</td>
<td>${d.bj}</td>
<td>${d.akumJHT}</td>
<td>${d.neto}</td>
<td>${d.ptkp}</td>
<td>${d.pkp}</td>
<td>${d.pphTER}</td>
<td>${d.pphFinal}</td>
<td>${d.selisih}</td>
<td>${d.ket}</td>

</tr>`;
});
}

// ================= SAVE =================
async function saveTax(){
let data=JSON.parse(localStorage.getItem("taxData")||"[]");
if(!data.length) return alert("Generate dulu");

await supabaseClient.from("tax_engine").upsert(data);
alert("Saved!");
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded",()=>{
loadFilter();

let saved=localStorage.getItem("taxData");
if(saved) render(JSON.parse(saved));
});

</script>
