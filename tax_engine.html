<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Tax Engine DJP</title>

<!-- WAJIB: SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6f9}
.header{background:#1f2d3d;color:white;padding:15px 20px;display:flex;justify-content:space-between}
button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;color:white}
.btn-blue{background:#3498db}
.btn-green{background:#27ae60}
.btn-orange{background:#f39c12}
.btn-grey{background:#6c757d}
.container{padding:20px}
.action-bar{display:flex;gap:10px;margin-bottom:15px}
table{width:100%;border-collapse:collapse;background:white}
th{background:#34495e;color:white;padding:8px;font-size:12px}
td{padding:6px;border-bottom:1px solid #ddd;font-size:12px;text-align:right}
td:nth-child(1),td:nth-child(2),td:nth-child(3){text-align:left}
</style>
</head>

<body>

<div class="header">
<h2>Tax Engine DJP</h2>
<button class="btn-grey" onclick="window.location.href='dashboard.html'">Back</button>
</div>

<div class="container">

<div class="action-bar">
<button class="btn-blue" onclick="generateTax()">Generate</button>
<input type="month" id="periode">
<button class="btn-green" onclick="saveData()">Save</button>
<button class="btn-orange" onclick="replaceData()">Replace</button>
</div>

<table id="tbl">
<thead>
<tr>
<th>NIK</th>
<th>Nama</th>
<th>Project</th>
<th>Bruto</th>
<th>Akum Bruto</th>
<th>Biaya</th>
<th>Pensiun</th>
<th>Neto</th>
<th>PTKP</th>
<th>PKP</th>
<th>TER</th>
<th>PPh21 (Progresif)</th>
<th>Selisih</th>
<th>Keterangan</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<!-- ================= SCRIPT (HARUS DI BAWAH) ================= -->
<script>

console.log("SCRIPT READY");

// ================= SUPABASE =================
const supabase = window.supabase.createClient(
'https://nwrbjbwjmkahjuuyizfq.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53cmJqYndqbWthaGp1dXlpemZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjM4OTIsImV4cCI6MjA5MjQ5OTg5Mn0.n67pONlkoMqZguyoTwQQFJ0VBRfPaIVuVlPGxsajaGA'
)

let hasil = []

// ================= DEFAULT PERIODE =================
(function(){
    let d=new Date()
    let y=d.getFullYear()
    let m=(d.getMonth()+1).toString().padStart(2,'0')
    document.getElementById("periode").value=`${y}-${m}`
})()

// ================= PTKP =================
function getPTKP(status){
    const map={
        "TK/0":54000000,"TK/1":58500000,"TK/2":63000000,"TK/3":67500000,
        "K/0":58500000,"K/1":63000000,"K/2":67500000,"K/3":72000000
    }
    return map[status]||54000000
}

// ================= PROGRESIF =================
function progresif(pkp){
    if(pkp<=0)return 0
    let p=0
    if(pkp>500000000){p+=(pkp-500000000)*0.30;pkp=500000000}
    if(pkp>250000000){p+=(pkp-250000000)*0.25;pkp=250000000}
    if(pkp>50000000){p+=(pkp-50000000)*0.15;pkp=50000000}
    p+=pkp*0.05
    return p
}

// ================= TER RANGE NOMINAL =================
function getTER(bruto, status){

    status = (status||"").trim()

    let kategori = "C"
    if(["TK/0","TK/1","K/0"].includes(status)) kategori="A"
    else if(["TK/2","TK/3","K/1"].includes(status)) kategori="B"

    let tarif = 0

    // ================= KATEGORI A =================
    if(kategori==="A"){
        if(bruto >= 0 && bruto <= 5000000) tarif = 0
        else if(bruto >= 5000001 && bruto <= 6000000) tarif = 0.0025
        else if(bruto >= 6000001 && bruto <= 7000000) tarif = 0.005
        else if(bruto >= 7000001 && bruto <= 8000000) tarif = 0.0075
        else if(bruto >= 8000001 && bruto <= 9000000) tarif = 0.01
        else if(bruto >= 9000001 && bruto <= 10000000) tarif = 0.015
        else if(bruto >= 10000001 && bruto <= 15000000) tarif = 0.02
        else if(bruto >= 15000001 && bruto <= 20000000) tarif = 0.025
        else if(bruto >= 20000001 && bruto <= 30000000) tarif = 0.03
        else tarif = 0.035
    }

    // ================= KATEGORI B =================
    if(kategori==="B"){
        if(bruto >= 0 && bruto <= 6000000) tarif = 0
        else if(bruto >= 6000001 && bruto <= 7000000) tarif = 0.0025
        else if(bruto >= 7000001 && bruto <= 8000000) tarif = 0.005
        else if(bruto >= 8000001 && bruto <= 9000000) tarif = 0.0075
        else if(bruto >= 9000001 && bruto <= 11000000) tarif = 0.01
        else if(bruto >= 11000001 && bruto <= 15000000) tarif = 0.015
        else if(bruto >= 15000001 && bruto <= 20000000) tarif = 0.02
        else if(bruto >= 20000001 && bruto <= 30000000) tarif = 0.025
        else tarif = 0.03
    }

    // ================= KATEGORI C =================
    if(kategori==="C"){
        if(bruto >= 0 && bruto <= 7000000) tarif = 0
        else if(bruto >= 7000001 && bruto <= 8000000) tarif = 0.0025
        else if(bruto >= 8000001 && bruto <= 9000000) tarif = 0.005
        else if(bruto >= 9000001 && bruto <= 10000000) tarif = 0.0075
        else if(bruto >= 10000001 && bruto <= 12000000) tarif = 0.01
        else if(bruto >= 12000001 && bruto <= 15000000) tarif = 0.015
        else if(bruto >= 15000001 && bruto <= 20000000) tarif = 0.02
        else if(bruto >= 20000001 && bruto <= 30000000) tarif = 0.025
        else tarif = 0.03
    }

    return bruto * tarif
}

// ================= GENERATE =================
async function generateTax(){

    console.log("GENERATE RUN");

    let periode=document.getElementById("periode").value
    if(!periode){alert("Pilih periode");return}

    let tahun=periode.split("-")[0]

    const {data:payroll}=await supabase.from('payroll').select('*').like('periode',`${tahun}%`)
    const {data:master}=await supabase.from('master_payroll').select('*')

    hasil=[]

    let group={}
    payroll.forEach(p=>{
        if(!group[p.nik])group[p.nik]=[]
        group[p.nik].push(p)
    })

    for(let nik in group){

        let data=group[nik].sort((a,b)=>a.periode.localeCompare(b.periode))

        let akumBruto=0
        let akumPensiun=0
        let bulanKe=0

        data.forEach(p=>{

            bulanKe++

            let m=master.find(x=>x.nik==p.nik)
            let status=(m?.status_pajak||"TK/0").trim()

            let bruto=(p.gaji_pokok||0)+(p.tunjangan||0)+(p.jkk||0)+(p.jkm||0)+(p.bpjs4||0)+(p.irregular||0)

            akumBruto+=bruto

            // biaya jabatan nominal
            let batas = bulanKe*500000
            if(batas>6000000) batas=6000000

            let biaya = akumBruto*0.05
            if(biaya>batas) biaya=batas

            let pensiun=(p.jht||0)+(p.jp||0)
            akumPensiun+=pensiun

            let neto=akumBruto-biaya-akumPensiun
            let ptkp=getPTKP(status)
            let pkp=Math.max(neto-ptkp,0)

            let ter = p.periode.endsWith("-12") ? 0 : getTER(bruto,status)

            let pph21 = progresif(pkp)

            let selisih = pph21 - ter

            hasil.push({
                nik,
                nama:m?.nama||"",
                project:m?.project||"",
                bruto,
                akum_bruto:akumBruto,
                biaya_jabatan:biaya,
                iuran_pensiun:akumPensiun,
                neto,
                ptkp,
                pkp,
                pph_ter:ter,
                pph21_final:pph21,
                selisih,
                keterangan: selisih>0?"Kurang Potong":"Lebih Potong"
            })
        })
    }

    render()
}

// ================= RENDER =================
function render(){
    let tbody=document.querySelector("#tbl tbody")
    tbody.innerHTML=""

    hasil.forEach(x=>{
        tbody.innerHTML+=`
        <tr>
        <td>${x.nik}</td>
        <td>${x.nama}</td>
        <td>${x.project}</td>
        <td>${x.bruto}</td>
        <td>${x.akum_bruto}</td>
        <td>${x.biaya_jabatan}</td>
        <td>${x.iuran_pensiun}</td>
        <td>${x.neto}</td>
        <td>${x.ptkp}</td>
        <td>${x.pkp}</td>
        <td>${x.pph_ter}</td>
        <td>${x.pph21_final}</td>
        <td>${x.selisih}</td>
        <td>${x.keterangan}</td>
        </tr>`
    })
}

// ================= SAVE =================
async function saveData(){
    if(hasil.length==0){alert("Generate dulu");return}
    await supabase.from('tax_engine').insert(hasil)
    alert("Berhasil simpan")
}

// ================= REPLACE =================
async function replaceData(){
    let periode=document.getElementById("periode").value
    await supabase.from('tax_engine').delete().eq('periode',periode)
    await saveData()
}

</script>

</body>
</html>
